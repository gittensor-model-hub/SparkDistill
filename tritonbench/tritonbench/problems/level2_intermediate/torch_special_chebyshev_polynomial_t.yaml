prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.special.chebyshev_polynomial_t`.


  Operator description:

  Computes the Chebyshev polynomial of the first kind T_n(input). If n = 0, returns 1. If n = 1, returns
  input. For n < 6 or |input| > 1, uses a recursive formula. Otherwise, uses an explicit trigonometric
  formula.


  Target Python signature / call pattern:

  chebyshev_polynomial_t(input, n, *, out=None) -> Tensor; Args: input (Tensor): the input tensor. n (Tensor):
  Degree of the polynomial. Keyword args: out (Tensor, optional): the output tensor.


  Mathematical definition:

  T_{n + 1}(input) = 2 \times input \times T_{n}(input) - T_{n - 1}(input)

  T_{n}(input) = \text{cos}(n \times \text{arccos}(x))


  PyTorch reference snippet:

  ```python

  torch.special.chebyshev_polynomial_t(input, n, out=None)

  ```


  Additional constraints:

  If n = 0, returns 1. If n = 1, returns input. Uses recursion for n < 6 or |input| > 1, otherwise uses
  trigonometric formula.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
