title: Torch Signbit
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.signbit`.


  Operator description:

  Tests if each element of the input tensor has its sign bit set or not. It handles signed zeros, so negative
  zero (-0) returns True.


  Target Python signature / call pattern:

  signbit(input, *, out=None) -> Tensor; Args: input (Tensor): the input tensor.; Keyword args: out (Tensor,
  optional): the output tensor.


  PyTorch reference snippet:

  ```python

  torch.signbit(a)

  ```


  Example / usage notes:

  >>> a = torch.tensor([0.7, -1.2, 0., 2.3])

  >>> torch.signbit(a)

  tensor([ False, True,  False,  False])

  >>> a = torch.tensor([-0.0, 0.0])

  >>> torch.signbit(a)

  tensor([ True,  False])


  Additional constraints:

  signbit handles signed zeros, so negative zero (-0) returns True.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
