id: apply_penalty
level: 2
category: kernel_debugging
title: Apply Penalty
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `apply_penalty.py` (repo: ModelTC/lightllm).


  Task description:

  The Triton JIT kernel `_fwd_kernel_apply_penalty` is designed to adjust the logits of a language model
  based on three types of penalties: presence, frequency, and repetition. These adjustments help in controlling
  the model''s output behavior concerning repetitive and previously seen tokens. The kernel operates per
  batch (`cur_batch`) and involves the following steps: it first loads the penalty coefficients for the
  current batch. It then determines the range of token indices for the batch using `p_cumsum_seq_len`.
  Using these indices, it loads token IDs (`batch_ids`) and their corresponding counts (`batch_ids_count`)
  from `p_token_ids` and `p_token_counts`, respectively. For each token, it adjusts the logit based on
  repetition, then frequency, and finally presence penalties. The adjusted logits are stored back into
  the `Logits` tensor. The function `apply_penalty` is a Python wrapper that ensures `Logits` is contiguous
  and calculates the appropriate block size (`BLOCK`) using Triton''s `next_power_of_2` function, ensuring
  it adheres to a minimum size for efficiency. It then invokes the kernel for each batch dimension (`Logits.shape[0]`),
  passing necessary parameters like penalties, token IDs, counts, cumulative sequence lengths, and strides
  of the logits tensor. The number of warps is fixed at 8 to balance performance and resource usage.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
