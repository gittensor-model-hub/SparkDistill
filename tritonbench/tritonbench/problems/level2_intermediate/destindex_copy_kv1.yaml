prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `destindex_copy_kv1.py` (repo: ModelTC/lightllm).


  Task description:

  The code provides a Triton kernel named _fwd_kernel_destindex_copy_kv, designed to facilitate the copying
  of tensor slices based on specified destination indices. This kernel is invoked within the destindex_copy_kv
  function, a wrapper function designed for PyTorch. The core functionality of the kernel involves processing
  a 3D input tensor K, representing data across batch size, head number, and head dimension, and transferring
  selected slices to the output tensor Out using indices from the DestLoc tensor. Each element in DestLoc
  maps to a position in the batch dimension of Out. The kernel logic iterates over each sequence element,
  indexed by cur_index, and determines the corresponding slice to copy using DestLoc. Offsets offs_h and
  offs_d calculate strides for accessing head and depth dimensions. The kernel dynamically adapts to input
  sizes, employing BLOCK_HEAD and BLOCK_DMODEL as block size parameters, computed as powers of two for
  optimal performance. The wrapper function orchestrates kernel execution by defining the execution grid
  as the sequence length, confirming dimensional integrity between K and Out, and invoking the kernel
  with appropriate stride and dimension parameters. By operating within Triton''s just-in-time compilation
  environment, this code exemplifies an efficient mechanism for parallel data manipulation in deep learning
  models.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
