title: Tril Mm And Scale
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `tril_mm_and_scale`.


  Operator description:

  Performs a matrix multiplication of the lower triangular part of matrix `A` with matrix `B`, scales
  the result by `alpha`, and then scales the final output by `beta`. The operations are as follows:

  1. Perform matrix multiplication between the lower triangular part of `A` (denoted as `torch.tril(A)`)
  and `B`, and scale the result by `alpha`.

  2. Scale the resulting matrix from step 1 by `beta` to obtain the final result.


  Target Python signature / call pattern:

  def tril_mm_and_scale(A: torch.Tensor, B: torch.Tensor, alpha: float, beta: float) -> torch.Tensor:
  A (Tensor): A 2D matrix to be multiplied, of shape (n, n). B (Tensor): A matrix to be multiplied with
  the lower triangular part of A, of shape (n, p). alpha (float): Scaling factor for the initial matrix
  multiplication result. beta (float): Scaling factor for the final result.


  Mathematical definition:

  B = alpha * torch.mm(torch.tril(A), B)

  C = beta * B


  PyTorch reference snippet:

  ```python

  torch.tril(A), torch.mm

  ```


  Example / usage notes:

  >>> A = torch.tensor([[2.0, 3.0], [1.0, 4.0]])

  >>> B = torch.tensor([[1.0, 2.0], [3.0, 4.0]])

  >>> alpha = 0.5

  >>> beta = 2.0

  >>> result = tril_mm_and_scale(A, B, alpha, beta)

  >>> print(result)


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
