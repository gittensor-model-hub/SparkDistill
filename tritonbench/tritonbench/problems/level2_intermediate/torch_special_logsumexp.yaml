prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.special.logsumexp`.


  Operator description:

  This function computes the logarithm of the sum of exponentials of input elements along the specified
  dimension. It is useful for numerical stability when computing log probabilities.


  Target Python signature / call pattern:

  def logsumexp(input, dim, keepdim=False, *, out=None) -> Tensor


  Mathematical definition:

  logsumexp(x) = log(sum(exp(x)))


  PyTorch reference snippet:

  ```python

  torch.logsumexp(input, dim, keepdim=False, out=None)

  ```


  Additional constraints:

  Alias for torch.logsumexp.


