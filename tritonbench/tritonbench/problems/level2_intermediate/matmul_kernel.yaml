title: Matmul Kernel
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `matmul_kernel.py` (repo: tinygrad/tinygrad).


  Task description:

  This Triton kernel `matmul_kernel` is designed for matrix multiplication of two large matrices, `a`
  and `b`, storing the result in `c`. The kernel operates using a blocked approach, where `BLOCK_SIZE_M`,
  `BLOCK_SIZE_N`, and `BLOCK_SIZE_K` dictate the dimensions of sub-matrices each thread block handles.
  The logical process begins by calculating each thread block''s starting position in the output matrix
  via `pid_m` and `pid_n`, which are program IDs along the two major axes. Matrix strides (`stride_am`,
  `stride_ak`, `stride_bk`, `stride_bn`, `stride_cm`, `stride_cn`) are used for accessing elements efficiently.
  Offsets `offs_am`, `offs_bn`, and `offs_k` are calculated to locate the correct sub-blocks of `a` and
  `b` for loading. The computation iterates over the K dimension in blocks, performing a dot product of
  sub-blocks `a` and `b`, accumulating results in `accumulator`. After processing all blocks along K,
  the result in `accumulator` is cast to `float16` and stored in `c`. The outer `matmul` function configures
  the kernel launch, calculating grid sizes as a function of the matrix dimensions `M`, `N`, and `K` divided
  by their respective block sizes.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
