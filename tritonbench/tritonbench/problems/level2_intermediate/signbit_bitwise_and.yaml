  \ tensor([False, True, False, False]) >>> bitwise_and_result tensor([0, 0, 0, 0], dtype=torch.int8)\n\
  \nAdditional constraints:\nThe tensors need to be of integral or boolean types for the bitwise AND operation.\n\
