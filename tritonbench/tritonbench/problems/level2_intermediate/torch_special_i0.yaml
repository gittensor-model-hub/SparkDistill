title: Torch Special I0
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.special.i0`.


  Operator description:

  Computes the zeroth order modified Bessel function of the first kind for each element of the input tensor.


  Target Python signature / call pattern:

  i0(input, *, out=None) -> Tensor; Args: input (Tensor): the input tensor; Keyword args: out (Tensor,
  optional): the output tensor.


  Mathematical definition:

  \text{out}_{i} = I_0(\text{input}_{i}) = \sum_{k=0}^{\infty} \frac{(\text{input}_{i}^2/4)^k}{(k!)^2}


  PyTorch reference snippet:

  ```python

  torch.i0(torch.arange(5, dtype=torch.float32))

  ```


  Example / usage notes:

  >>> torch.i0(torch.arange(5, dtype=torch.float32))

  tensor([ 1.0000,  1.2661,  2.2796,  4.8808, 11.3019])


  Additional constraints:

  The function calculates the zeroth order modified Bessel function of the first kind, which is a special
  mathematical function.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
