id: torch_div
level: 2
category: kernel_translation
title: Torch Div
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.div`.\n\
  \nOperator description:\nDivides each element of the input tensor by the corresponding element of the\
  \ other tensor, supporting broadcasting, type promotion, and handling integer, float, and complex inputs.\
  \ Rounding behavior can be controlled with the rounding_mode parameter.\n\nTarget Python signature /\
  \ call pattern:\ndiv(input, other, *, rounding_mode=None, out=None) -> Tensor; input (Tensor): the dividend;\
  \ other (Tensor or Number): the divisor; rounding_mode (str, optional): Type of rounding applied to\
  \ the result; out (Tensor, optional): the output tensor\n\nMathematical definition:\n\\text{out}_i =\
  \ \\frac{\\text{input}_i}{\\text{other}_i}\n\nPyTorch reference snippet:\n```python\ntorch.div(x, 0.5);\
  \ torch.div(a, b); torch.div(a, b, rounding_mode='trunc'); torch.div(a, b, rounding_mode='floor')\n\
  ```\n\nExample / usage notes:\n>>> x = torch.tensor([ 0.3810,  1.2774, -0.2972, -0.3719,  0.4637])\n\
  >>> torch.div(x, 0.5)\ntensor([ 0.7620,  2.5548, -0.5944, -0.7438,  0.9274])\n\n>>> a = torch.tensor([[-0.3711,\
  \ -1.9353, -0.4605, -0.2917],\n...                   [ 0.1815, -1.0111,  0.9805, -1.5923],\n...    \
  \               [ 0.1062,  1.4581,  0.7759, -1.2344],\n...                   [-0.1830, -0.0313,  1.1908,\
  \ -1.4757]])\n>>> b = torch.tensor([ 0.8032,  0.2930, -0.8113, -0.2308])\n>>> torch.div(a, b)\ntensor([[-0.4620,\
  \ -6.6051,  0.5676,  1.2639],\n        [ 0.2260, -3.4509, -1.2086,  6.8990],\n        [ 0.1322,  4.9764,\
  \ -0.9564,  5.3484],\n        [-0.2278, -0.1068, -1.4678,  6.3938]])\n\n>>> torch.div(a, b, rounding_mode='trunc')\n\
  tensor([[-0., -6.,  0.,  1.],\n        [ 0., -3., -1.,  6.],\n        [ 0.,  4., -0.,  5.],\n      \
  \  [-0., -0., -1.,  6.]])\n\n>>> torch.div(a, b, rounding_mode='floor')\ntensor([[-1., -7.,  0.,  1.],\n\
  \        [ 0., -4., -2.,  6.],\n        [ 0.,  4., -1.,  5.],\n        [-1., -1., -2.,  6.]])\n\nAdditional\
  \ constraints:\nBy default, performs a 'true' division like Python 3. Supports broadcasting to a common\
  \ shape, type promotion, and integer, float, and complex inputs. Always promotes integer types to the\
  \ default scalar type.\n\nRequirements (SparkDistill / TritonBench harness):\n- Translate the PyTorch\
  \ reference into Triton 3.7.1 kernels for Blackwell SM120\n- Preserve numerics: include torch.allclose\
  \ vs the reference (atol/rtol appropriate for dtype)\n- Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor\
  \ over tl.make_block_ptr\n- Add @triton.autotune when there are meaningful tile/block choices\n- Provide\
  \ a launcher and a small self-contained test"
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  params_cnt: 4
  torch_cnt: 4
  func_inputs: 'div(input, other, *, rounding_mode=None, out=None) -> Tensor; input (Tensor): the dividend;
    other (Tensor or Number): the divisor; rounding_mode (str, optional): Type of rounding applied to
    the result; out (Tensor, optional): the output tensor'
required_patterns:
- '@triton.jit'
- tl.load
- tl.store
- torch.allclose
- '@triton.autotune'
