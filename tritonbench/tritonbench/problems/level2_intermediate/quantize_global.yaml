title: Quantize Global
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `quantize_global.py` (repo: bitsandbytes-foundation/bitsandbytes).


  Task description:

  The Triton kernel `_quantize_global` performs global quantization on a tensor `x` by transforming its
  floating-point elements into an 8-bit integer representation. The kernel operates over CUDA using Triton''s
  JIT compilation, and is equipped with autotuning to optimize the `BLOCK_SIZE` for different workloads.
  It takes `x_ptr`, a pointer to the input tensor `x`, `absmax_inv_ptr`, a pointer to the precomputed
  inverse of the maximum absolute value of `x`, and `output_ptr`, a pointer where the quantized results
  are stored. The `n_elements` parameter specifies the total number of elements to be processed. The kernel
  computes `pid` using the Triton `program_id` to identify the current program instance and calculates
  `block_start` and `offsets` to determine the specific segment of data it processes. It uses `tl.load`
  to read `BLOCK_SIZE` contiguous elements from `x`, applies the quantization operation using `tl.extra.cuda.libdevice.llrint`,
  which rounds the scaled values to the nearest integer, and writes the results into the output buffer.
  The surrounding Python function `quantize_global` first calculates `absmax` as the maximum absolute
  value of `x`, derives its reciprocal as `absmax_inv`, initializes an output tensor, and then dispatches
  the Triton kernel over a grid, with the grid size dynamically determined based on the input size and
  `BLOCK_SIZE`. After execution, it returns the quantized tensor and the original maximum absolute value,
  which might be used for dequantization.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
