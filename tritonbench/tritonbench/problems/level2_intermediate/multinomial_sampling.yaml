title: Multinomial Sampling
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `multinomial_sampling.py` (repo: InternLM/lmdeploy).


  Task description:

  The code defines a Triton-based multinomial sampling procedure for sampling indices from a probability
  distribution described by the `scores` tensor. This distribution is organized as a 2D tensor with dimensions
  [batch_size, num_tokens], where each row represents a batch and each column represents a token''s score.
  The `multinomial_sampling` function prepares for kernel execution by setting block sizes (BLOCK = 8,
  BLOCK_N = 128), creating a grid for parallel execution, and computing necessary strides for accessing
  tensor elements.


  The Triton kernel `_multinomial_sampling_kernel` executes the core logic: for each batch, it initializes
  sampling seeds and offsets, uses them to generate random samples, and iteratively computes cumulative
  scores for the token scores block-wise. The kernel then determines the token indices where each random
  sample falls within the cumulative probability range and stores the result. This approach ensures efficient
  parallel computation and supports large batch sizes with many tokens.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
