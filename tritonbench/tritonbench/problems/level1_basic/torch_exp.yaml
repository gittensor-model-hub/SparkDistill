id: torch_exp
level: 1
category: kernel_translation
title: Torch Exp
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.exp`.\n\
  \nOperator description:\nReturns a new tensor with the exponential of the elements of the input tensor.\n\
  \nTarget Python signature / call pattern:\nexp(input, *, out=None) -> Tensor\n    input (Tensor): the\
  \ input tensor.\n    out (Tensor, optional): the output tensor.\n\nMathematical definition:\ny_{i} =\
  \ e^{x_{i}}\n\nPyTorch reference snippet:\n```python\ntorch.exp(torch.tensor([0, math.log(2.)]))\n```\n\
  \nExample / usage notes:\n>>> torch.exp(torch.tensor([0, math.log(2.)])) tensor([ 1.,  2.])\n\nRequirements\
  \ (SparkDistill / TritonBench harness):\n- Translate the PyTorch reference into Triton 3.7.1 kernels\
  \ for Blackwell SM120\n- Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate\
  \ for dtype)\n- Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr\n\
  - Add @triton.autotune when there are meaningful tile/block choices\n- Provide a launcher and a small\
  \ self-contained test"
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  params_cnt: 2
  torch_cnt: 1
  func_inputs: "exp(input, *, out=None) -> Tensor\n    input (Tensor): the input tensor.\n    out (Tensor,\
    \ optional): the output tensor."
