prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `exp_sqrt`.


  Operator description:

  Computes the exponential of each element in the input tensor, followed by calculating the square root
  of the result. Returns a tensor where each element is the result of applying exponential followed by
  square root to each element of input.


  Target Python signature / call pattern:

  def exp_sqrt(input, out=None) -> Tensor; input (Tensor): The input tensor.; out (Tensor, optional):
  The output tensor.


  Mathematical definition:

  \text{out}_i = \sqrt{e^{\text{input}_i}}


  PyTorch reference snippet:

  ```python

  torch.exp(input)

  torch.sqrt(exp_result, out=out)

  ```


  Example / usage notes:

  >>> import torch

  >>> a = torch.tensor([0.0, 1.0, 2.0, 3.0])

  >>> result = exp_sqrt(a)

  >>> result

  tensor([1.0000, 1.6487, 2.7183, 4.4817])


  >>> a = torch.tensor([-1.0, 0.5, 5.0, -3.0])

  >>> result = exp_sqrt(a)

  >>> result

  tensor([1.6487, 1.2840, 148.4132, 0.3679])


  Additional constraints:

  This function will return NaN for input elements that result in negative values after `exp` and `sqrt`
  due to overflow.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
