title: Seeded Dropout
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `seeded_dropout.py` (repo: triton-lang/triton).\n\nTask description:\nThe provided Triton kernel\
  \ _seeded_dropout and the Python function seeded_dropout implement a seeded dropout operation on a given\
  \ tensor x. The purpose of this implementation is to simulate the dropout operation, which is typically\
  \ used to prevent overfitting in neural networks by randomly setting elements of the input tensor to\
  \ zero based on a probability p. \n\n        The function _seeded_dropout is a Triton kernel, meaning\
  \ it's executed in parallel on a GPU. It takes several arguments: x_ptr and output_ptr, which are pointers\
  \ to the input and output data; n_elements, the number of elements to process; p, the probability of\
  \ setting a value to zero; seed, a fixed seed for random number generation to ensure reproducibility;\
  \ and BLOCK_SIZE, a constant expression defining the size of blocks of data processed by each kernel\
  \ instance. The kernel calculates offsets for each block based on the program ID, loads data from the\
  \ input pointer using these offsets, and generates a random number per element using tl.rand. A mask\
  \ is created where random numbers greater than the probability p indicate elements that are kept. These\
  \ elements are scaled by 1/(1-p) to keep the output mean consistent with the input. The result is stored\
  \ in the output pointer, ensuring values outside the bounds of n_elements are masked.\n\n        The\
  \ function seeded_dropout is a wrapper around the Triton kernel. It initializes an output tensor of\
  \ the same shape and type as the input tensor x and ensures the input tensor is contiguous. It calculates\
  \ the grid size needed to cover all input elements given the specified BLOCK_SIZE, which determines\
  \ how many elements each kernel instance will process. The Triton kernel _seeded_dropout is then launched\
  \ with this grid configuration. Finally, the output tensor is returned, containing the dropout-applied\
  \ version of the input tensor.\n\nRequirements (SparkDistill / TritonBench harness):\n- Target Triton\
  \ 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor over deprecated\
  \ tl.make_block_ptr\n- Use @triton.jit kernels with correct boundary masking\n- Include @triton.autotune\
  \ with at least 3 configs when tile sizes matter\n- Provide a Python launcher + grid and a torch.allclose\
  \ correctness test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short note if you intentionally\
  \ skip autotune for a tiny elementwise kernel"
