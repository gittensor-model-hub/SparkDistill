title: Torch Special Digamma
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.special.digamma`.\n\
  \nOperator description:\nComputes the logarithmic derivative of the gamma function on input. This function\
  \ is similar to SciPy's scipy.special.digamma. From PyTorch 1.8 onwards, the digamma function returns\
  \ -Inf for 0, previously it returned NaN for 0.\n\nTarget Python signature / call pattern:\ndigamma(input,\
  \ *, out=None) -> Tensor; Args: input (Tensor): the tensor to compute the digamma function on; Keyword\
  \ args: out (Tensor, optional): the output tensor.\n\nMathematical definition:\n\\digamma(x) = \\frac{d}{dx}\
  \ \\ln\\left(\\Gamma\\left(x\\right)\\right) = \\frac{\\Gamma'(x)}{\\Gamma(x)}\n\nPyTorch reference\
  \ snippet:\n```python\ntorch.special.digamma(a)\n```\n\nExample / usage notes:\nExample::\n\n    >>>\
  \ a = torch.tensor([1, 0.5])\n    >>> torch.special.digamma(a)\n    tensor([-0.5772, -1.9635])\n\nAdditional\
  \ constraints:\nThis function is similar to SciPy's scipy.special.digamma. From PyTorch 1.8 onwards,\
  \ the digamma function returns -Inf for 0, previously it returned NaN for 0.\n\nRequirements (SparkDistill\
  \ / TritonBench harness):\n- Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell\
  \ SM120\n- Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)\n\
  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr\n- Add @triton.autotune\
  \ when there are meaningful tile/block choices\n- Provide a launcher and a small self-contained test"
