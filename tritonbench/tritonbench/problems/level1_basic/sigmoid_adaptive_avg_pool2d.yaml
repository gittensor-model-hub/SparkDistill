prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `sigmoid_adaptive_avg_pool2d`.


  Operator description:

  Applies a 2D adaptive average pooling over an input tensor, followed by the sigmoid activation function
  applied element-wise. This is used for downsampling a feature map to a specified output size and then
  normalizing the result with the sigmoid function.


  Target Python signature / call pattern:

  def sigmoid_adaptive_avg_pool2d(input: Tensor, output_size: Union[int, Tuple[int, int]]) -> Tensor


  Mathematical definition:

  out = σ(AdaptiveAvgPool2D(input))

  Sigmoid(x) = 1 / (1 + exp(-x))


  PyTorch reference snippet:

  ```python

  torch.nn.functional.adaptive_avg_pool2d(input, output_size)

  torch.nn.functional.sigmoid(pooled_result)

  ```


  Example / usage notes:

  >>> import torch

  >>> import torch.nn.functional as F

  >>> # Define input tensor

  >>> input = torch.randn(1, 3, 64, 64)  # (batch, channels, height, width)

  >>> # Apply sigmoid_adaptive_avg_pool2d to downsample to 32x32

  >>> result = sigmoid_adaptive_avg_pool2d(input, output_size=(32, 32))

  >>> result.shape

  torch.Size([1, 3, 32, 32])


  >>> # Apply sigmoid_adaptive_avg_pool2d with output size 1x1

  >>> result = sigmoid_adaptive_avg_pool2d(input, output_size=(1, 1))

  >>> result.shape

  torch.Size([1, 3, 1, 1])


  Additional constraints:

  Each element in the resulting tensor is scaled to the range (0, 1) by the sigmoid activation.


