  Target Python signature / call pattern:

  sigmoid(input, *, out=None) -> Tensor


  Mathematical definition:

  The sigmoid function is defined as: sigmoid(x) = 1 / (1 + exp(-x))


  PyTorch reference snippet:

  ```python

  torch.sigmoid(input)

