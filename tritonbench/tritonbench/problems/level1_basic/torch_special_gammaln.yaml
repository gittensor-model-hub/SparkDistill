prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.special.gammaln`.\n\
  \nOperator description:\nComputes the natural logarithm of the absolute value of the gamma function\
  \ on the input tensor.\n\nTarget Python signature / call pattern:\ngammaln(input, *, out=None) -> Tensor\n\
  \nArgs:\n    input (Tensor): the input tensor.\n\nKeyword args:\n    out (Tensor, optional): the output\
  \ tensor.\n\nMathematical definition:\n\\text{out}_{i} = \\ln \\Gamma(|\\text{input}_{i}|)\n\nPyTorch\
  \ reference snippet:\n```python\ntorch.special.gammaln(a)\n```\n\nExample / usage notes:\n>>> a = torch.arange(0.5,\
  \ 2, 0.5)\n>>> torch.special.gammaln(a)\ntensor([ 0.5724,  0.0000, -0.1208])\n\nRequirements (SparkDistill\
  \ / TritonBench harness):\n- Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell\
  \ SM120\n- Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)\n\
  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr\n- Add @triton.autotune\
  \ when there are meaningful tile/block choices\n- Provide a launcher and a small self-contained test"
