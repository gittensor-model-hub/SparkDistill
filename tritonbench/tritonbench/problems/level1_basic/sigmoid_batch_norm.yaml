title: Sigmoid Batch Norm
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `sigmoid_batch_norm`.\n\
  \nOperator description:\nApplies Batch Normalization over the input tensor across each channel, followed\
  \ by applying the sigmoid activation function element-wise to the normalized result. This is useful\
  \ for scaling the output to a range between 0 and 1 after normalization.\n\nTarget Python signature\
  \ / call pattern:\ndef sigmoid_batch_norm(input, running_mean, running_var, weight=None, bias=None,\
  \ training=False, momentum=0.1, eps=1e-5) -> Tensor\nArgs:\n    input (Tensor): The input tensor of\
  \ shape `(N, C)` or `(N, C, L)`, where `N` is batch size, `C` is the number of features or channels,\
  \ and `L` is the sequence length.\n    running_mean (Tensor): The running mean of the input channels.\n\
  \    running_var (Tensor): The running variance of the input channels.\n    weight (Tensor, optional):\
  \ Learnable scaling factor for each channel, typically represented as `γ`. Default: None.\n    bias\
  \ (Tensor, optional): Learnable shift for each channel, typically represented as `β`. Default: None.\n\
  \    training (bool, optional): If `True`, updates running statistics; if `False`, uses them for normalization.\
  \ Default: False.\n    momentum (float, optional): Value for updating the running mean and variance.\
  \ Default: 0.1.\n    eps (float, optional): A small value added for numerical stability. Default: 1e-5.\n\
  \nMathematical definition:\n\\text{out} = \\sigma\\left(\\frac{\\text{input} - \\text{mean}}{\\sqrt{\\\
  text{var} + \\epsilon}} * \\gamma + \\beta \\right) where \\sigma(x) = \\frac{1}{1 + \\exp(-x)} is the\
  \ sigmoid function.\n\nPyTorch reference snippet:\n```python\ntorch.nn.functional.batch_norm(input,\
  \ running_mean, running_var, weight, bias, training=training, momentum=momentum, eps=eps)\ntorch.sigmoid(bn_result)\n\
  ```\n\nExample / usage notes:\n>>> import torch\n>>> import torch.nn.functional as F\n>>> # Define input\
  \ tensor and batch normalization parameters\n>>> input = torch.randn(20, 10)\n>>> running_mean = torch.zeros(10)\n\
  >>> running_var = torch.ones(10)\n>>> weight = torch.ones(10)\n>>> bias = torch.zeros(10)\n>>> # Apply\
  \ batch normalization followed by sigmoid activation\n>>> result = sigmoid_batch_norm(input, running_mean,\
  \ running_var, weight, bias, training=True)\n>>> result.shape\ntorch.Size([20, 10])\n\nAdditional constraints:\n\
  The function normalizes the input tensor using batch normalization and then applies the sigmoid activation\
  \ function to scale the output between 0 and 1.\n\nRequirements (SparkDistill / TritonBench harness):\n\
  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120\n- Preserve numerics:\
  \ include torch.allclose vs the reference (atol/rtol appropriate for dtype)\n- Use @triton.jit + boundary\
  \ masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr\n- Add @triton.autotune when there\
  \ are meaningful tile/block choices\n- Provide a launcher and a small self-contained test"
