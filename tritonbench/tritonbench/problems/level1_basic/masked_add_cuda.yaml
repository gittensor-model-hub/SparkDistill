id: masked_add_cuda
level: 1
category: kernel_generation
title: Masked Add Cuda
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `masked_add_cuda.py` (repo: thu-ml/2by4-pretrain-acc-examples).


  Task description:

  This code implements a Triton kernel called `masked_add_kernel` and a function `masked_add` to invoke
  the kernel. The kernel operates on CUDA tensors `grad_ptr`, `p_ptr`, and `p_mask_ptr` over blocks of
  size `BLOCK_SIZE`. It calculates indices to work on using `tl.program_id` and checks bounds using a
  `mask`. It then loads elements from `p_mask_ptr` and converts them to boolean masks using `tl.int1`.
  The kernel performs an element-wise addition on `grad_ptr` with `p_ptr` multiplied by `alpha`, masked
  by `p_mask`. The result is stored back in `grad_ptr`. The wrapper function `masked_add` asserts that
  all tensors are on CUDA, with the same layout and strides. It determines the grid size based on `n_elements`
  and launches the kernel with the specified block size, passing tensor data and parameters for computation.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  dtype_hint: float32 preferred unless the task requires lower precision
required_patterns:
- '@triton.jit'
- tl.load
- tl.store
- mask
- '@triton.autotune'
