title: Sin Kernel
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `sin_kernel.py` (repo: pytorch/pytorch).\n\nTask description:\nThe code implements a Triton\
  \ kernel named `kernel_function`, which processes input data using block-wise operations. \n       \
  \     The kernel takes pointers to input and output data (`x_ptr` and `output_ptr`), the total number\
  \ of elements to process (`n_elements`), and a constant block size (`BLOCK_SIZE`). \n            Inside\
  \ the kernel, each program instance calculates its starting point (`block_start`) and creates an `offsets`\
  \ tensor for element indexing. \n            A mask ensures operations only occur on valid indices within\
  \ the input bounds. The kernel loads data from `x_ptr`, computes the sine using `tl.math.sin`, and stores\
  \ the result in `output_ptr`. \n            The `call_kernel` function prepares to execute the kernel\
  \ by calculating the total number of elements (`n_elements`) and creates an output tensor. \n      \
  \      It defines a grid configuration function using lambda to handle thread block calculations based\
  \ on `BLOCK_SIZE`, ensuring the entire input is processed. \n            The kernel is then launched\
  \ with the grid configuration, input, output, and element count.\n\nRequirements (SparkDistill / TritonBench\
  \ harness):\n- Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor\
  \ over deprecated tl.make_block_ptr\n- Use @triton.jit kernels with correct boundary masking\n- Include\
  \ @triton.autotune with at least 3 configs when tile sizes matter\n- Provide a Python launcher + grid\
  \ and a torch.allclose correctness test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short\
  \ note if you intentionally skip autotune for a tiny elementwise kernel"
constraints:
