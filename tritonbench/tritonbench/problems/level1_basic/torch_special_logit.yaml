title: Torch Special Logit
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.special.logit`.


  Operator description:

  Returns a new tensor with the logit of the elements of input. The input is clamped to [eps, 1 - eps]
  when eps is not None. When eps is None and input < 0 or input > 1, the function yields NaN.


  Target Python signature / call pattern:

  logit(input, eps=None, *, out=None) -> Tensor; input (Tensor): the input tensor.; eps (float, optional):
  the epsilon for input clamp bound. Default: None; out (Tensor, optional): the output tensor.


  Mathematical definition:

  y_{i} = \ln(\frac{z_{i}}{1 - z_{i}}); z_{i} = \begin{cases} x_{i} & \text{if eps is None} \\ \text{eps}
  & \text{if } x_{i} < \text{eps} \\ x_{i} & \text{if } \text{eps} \leq x_{i} \leq 1 - \text{eps} \\ 1
  - \text{eps} & \text{if } x_{i} > 1 - \text{eps} \end{cases}


  PyTorch reference snippet:

  ```python

  torch.special.logit(a, eps=1e-6)

  ```


  Example / usage notes:

  >>> a = torch.rand(5)

  >>> a

  tensor([0.2796, 0.9331, 0.6486, 0.1523, 0.6516])

  >>> torch.special.logit(a, eps=1e-6)

  tensor([-0.9466,  2.6352,  0.6131, -1.7169,  0.6261])


  Additional constraints:

  input is clamped to [eps, 1 - eps] when eps is not None. When eps is None and input < 0 or input > 1,
  the function yields NaN.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
