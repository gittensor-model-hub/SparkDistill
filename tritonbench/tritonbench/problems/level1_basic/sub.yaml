prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `sub`.


  Operator description:

  Subtracts :attr:`other`, scaled by :attr:`alpha`, from :attr:`input`. The operation is defined as: out_i
  = input_i - alpha * other_i. Supports broadcasting to a common shape, type promotion, and works with
  integer, float, and complex inputs.


  Target Python signature / call pattern:

  sub(input, other, *, alpha=1, out=None) -> Tensor; input (Tensor): the input tensor.; other (Tensor
  or Number): the tensor or number to subtract from input.; alpha (Number): the multiplier for other.;
  out (Tensor, optional): the output tensor.


  Mathematical definition:

  out_i = input_i - alpha * other_i


  PyTorch reference snippet:

  ```python

  torch.sub(a, b, alpha=2)

  ```


  Example / usage notes:

  >>> a = torch.tensor((1, 2))

  >>> b = torch.tensor((0, 1))

  >>> torch.sub(a, b, alpha=2)

  tensor([1, 0])


  Additional constraints:

  Supports broadcasting, type promotion, and works with integer, float, and complex inputs.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
