    \ value for the set of points. If `Tensor`, it must be 0-dimensional\n    end (float or Tensor): the\
    \ ending value for the set of points. If `Tensor`, it must be 0-dimensional\n    steps (int): size\
    \ of the constructed tensor\n    base (float, optional): base of the logarithm function. Default:\
    \ 10.0.\n\nKeyword arguments:\n    ou"
