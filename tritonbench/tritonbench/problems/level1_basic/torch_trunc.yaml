title: Torch Trunc
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.trunc`.\n\
  \nOperator description:\nReturns a new tensor with the truncated integer values of the elements of the\
  \ input tensor. For integer inputs, it follows the array-api convention of returning a copy of the input\
  \ tensor.\n\nTarget Python signature / call pattern:\ntrunc(input, *, out=None) -> Tensor\n\nArgs:\n\
  \    input (Tensor): the input tensor.\n\nKeyword args:\n    out (Tensor, optional): the output tensor.\n\
  \nPyTorch reference snippet:\n```python\ntorch.trunc(a)\n```\n\nExample / usage notes:\n>>> a = torch.randn(4)\n\
  >>> a\ntensor([ 3.4742,  0.5466, -0.8008, -0.9079])\n>>> torch.trunc(a)\ntensor([ 3.,  0., -0., -0.])\n\
  \nAdditional constraints:\nFor integer inputs, follows the array-api convention of returning a copy\
  \ of the input tensor.\n\nRequirements (SparkDistill / TritonBench harness):\n- Translate the PyTorch\
  \ reference into Triton 3.7.1 kernels for Blackwell SM120\n- Preserve numerics: include torch.allclose\
  \ vs the reference (atol/rtol appropriate for dtype)\n- Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor\
  \ over tl.make_block_ptr\n- Add @triton.autotune when there are meaningful tile/block choices\n- Provide\
  \ a launcher and a small self-contained test"
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  params_cnt: 2
  torch_cnt: 1
  func_inputs: "trunc(input, *, out=None) -> Tensor\n\nArgs:\n    input (Tensor): the input tensor.\n\n\
    Keyword args:\n    out (Tensor, optional): the output tensor."
required_patterns:
- '@triton.jit'
- tl.load
- tl.store
- torch.allclose
- '@triton.autotune'
