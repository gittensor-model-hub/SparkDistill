title: Erfc Sqrt
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `erfc_sqrt`.


  Operator description:

  Computes the complementary error function (erfc) and the square root of each element in the input tensor.


  Target Python signature / call pattern:

  def erfc_sqrt(input: torch.Tensor) -> Tuple[torch.Tensor, torch.Tensor]: The input tensor for which
  the erfc and square root are computed.


  Mathematical definition:

  \text{erfc}(x) = 1 - \frac{2}{\sqrt{\pi}} \int_{0}^{x} e^{-t^2} dt \text{out}_{i} = \sqrt{\text{input}_{i}}


  PyTorch reference snippet:

  ```python

  erfc_result = torch.special.erfc(input) sqrt_result = torch.sqrt(input)

  ```


  Example / usage notes:

  >>> a = torch.tensor([0, -1., 10., 0.25]) >>> erfc_result, sqrt_result = erfc_sqrt(a) >>> erfc_result
  tensor([ 1.0000,  1.8427,  0.0000,  0.5205]) >>> sqrt_result tensor([0.0000,    nan, 3.1623, 0.5000])


  Additional constraints:

  Returns a tuple containing the erfc result and the square root result for each element in the input
  tensor.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
