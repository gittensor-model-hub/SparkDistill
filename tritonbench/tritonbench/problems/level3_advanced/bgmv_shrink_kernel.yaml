title: Bgmv Shrink Kernel
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `bgmv_shrink_kernel.py` (repo: vllm-project/vllm).\n\nTask description:\nThe Triton kernel `_bgmv_shrink_kernel`\
  \ is designed for executing a batched generalized matrix-vector multiplication (BGMV) using low-rank\
  \ adaptation (LORA). It is optimized for GPU execution using Triton's just-in-time (JIT) compilation.\n\
  \n            The kernel operates as follows:\n            - It processes multiple batches of input\
  \ data, with each batch associated with a possibly different LORA matrix indicated by `lora_indices`.\
  \ If a batch's index in `lora_indices` is -1, it is skipped.\n            - The computation involves\
  \ splitting the `K` dimension into manageable blocks of size `BLOCK_K`. `SPLIT_K` determines how many\
  \ such blocks are processed by each kernel instance.\n            - `input_ptr` and `lora_ptr` provide\
  \ the starting addresses of input data and LORA matrices, respectively. Strides define how elements\
  \ in these tensors are laid out in memory, facilitating efficient data loading.\n            - The kernel\
  \ initializes a zeroed accumulator for each block and iteratively loads blocks of data from the input\
  \ tensor and LORA matrix. It performs element-wise multiplication and reduction, summing the results\
  \ along the `K` dimension.\n            - The `scaling` factor is applied to the accumulated result\
  \ before storing it back in the `out_ptr` location, with atomic addition used if reductions across multiple\
  \ kernel instances are required (`SPLIT_K` > 1).\n\n            The wrapper function `_bgmv_shrink`\
  \ is responsible for configuring and launching the kernel:\n            - It ensures the input, LORA\
  \ weight matrix, and output tensor are contiguous in memory to enhance access speed and reduces risk\
  \ of memory-bound operations.\n            - It extracts the batch count and the dimensions `N` and\
  \ `K` from the LORA weight tensor.\n            - `BLOCK_N` is computed as the next power of two greater\
  \ than or equal to `N` to ensure optimal performance on the hardware.\n            - A grid of threads\
  \ is configured to handle the number of batches and the split of the `K` dimension, ensuring efficient\
  \ parallel execution.\n            - Finally, the kernel is invoked with the prepared arguments and\
  \ configuration.\n\nRequirements (SparkDistill / TritonBench harness):\n- Target Triton 3.7.1 on workstation\
  \ Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr\n\
  - Use @triton.jit kernels with correct boundary masking\n- Include @triton.autotune with at least 3\
  \ configs when tile sizes matter\n- Provide a Python launcher + grid and a torch.allclose correctness\
  \ test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short note if you intentionally skip\
  \ autotune for a tiny elementwise kernel"
