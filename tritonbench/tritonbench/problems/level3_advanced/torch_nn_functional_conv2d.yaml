title: Torch Nn Functional Conv2D
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.nn.functional.conv2d`.


  Operator description:

  Applies a 2D convolution over an input image composed of several input planes. Supports TensorFloat32.
  May select a nondeterministic algorithm on CUDA with CuDNN for performance. Supports complex data types.


  Target Python signature / call pattern:

  conv2d(input, weight, bias=None, stride=1, padding=0, dilation=1, groups=1) -> Tensor Args: input: input
  tensor of shape (minibatch , in_channels , iH , iW) weight: filters of shape (out_channels , in_channels/groups
  , kH , kW) bias: optional bias tensor of shape (out_channels). Default: None stride: the stride of the
  convolving kernel. Can be a single number or a tuple (sH, sW). Default: 1 padding: implicit paddings
  on both sides of the input. Can be a string {''valid'', ''same''}, single number or a tuple (padH, padW).
  Default: 0 dilation: the spacing between kernel elements. Can be a single number or a tuple (dH, dW).
  Default: 1 groups: split input into groups, both in_channels and out_channels should be divisible by
  the number of groups. Default: 1


  PyTorch reference snippet:

  ```python

  F.conv2d(inputs, filters, padding=1)

  ```


  Example / usage notes:

  >>> # With square kernels and equal stride

  >>> filters = torch.randn(8, 4, 3, 3)

  >>> inputs = torch.randn(1, 4, 5, 5)

  >>> F.conv2d(inputs, filters, padding=1)


  Additional constraints:

  Supports TensorFloat32. May select a nondeterministic algorithm on CUDA with CuDNN. Supports complex
  data types.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
