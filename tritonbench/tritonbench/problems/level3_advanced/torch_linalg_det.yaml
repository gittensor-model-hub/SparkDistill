title: Torch Linalg Det
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.linalg.det`.


  Operator description:

  Computes the determinant of a square matrix. Supports input of float, double, cfloat and cdouble dtypes.
  Also supports batches of matrices, and if A is a batch of matrices then the output has the same batch
  dimensions.


  Target Python signature / call pattern:

  linalg.det(A, *, out=None) -> Tensor; A (Tensor): tensor of shape (*, n, n) where * is zero or more
  batch dimensions; out (Tensor, optional): output tensor. Ignored if None. Default: None.


  PyTorch reference snippet:

  ```python

  torch.linalg.det(A)

  ```


  Example / usage notes:

  >>> A = torch.randn(3, 3)

  >>> torch.linalg.det(A)

  tensor(0.0934)


  >>> A = torch.randn(3, 2, 2)

  >>> torch.linalg.det(A)

  tensor([1.1990, 0.4099, 0.7386])


  Additional constraints:

  :func:`torch.linalg.slogdet` computes the sign and natural logarithm of the absolute value of the determinant
  of square matrices.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
