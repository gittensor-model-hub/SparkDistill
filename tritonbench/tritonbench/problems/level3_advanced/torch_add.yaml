title: Torch Add
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.add`.\n\
  \nOperator description:\nAdds the tensor or number 'other', scaled by 'alpha', to the 'input' tensor.\
  \ Supports broadcasting to a common shape, type promotion, and accepts integer, float, and complex inputs.\n\
  \nTarget Python signature / call pattern:\nadd(input, other, *, alpha=1, out=None) -> Tensor; input\
  \ (Tensor): the input tensor.; other (Tensor or Number): the tensor or number to add to input.; alpha\
  \ (Number): the multiplier for other.; out (Tensor, optional): the output tensor.\n\nMathematical definition:\n\
  \\text{{out}}_i = \\text{{input}}_i + \\text{{alpha}} \\times \\text{{other}}_i\n\nPyTorch reference\
  \ snippet:\n```python\ntorch.add(a, 20); torch.add(b, c, alpha=10)\n```\n\nExample / usage notes:\n\
  >>> a = torch.randn(4)\n>>> a\ntensor([ 0.0202,  1.0985,  1.3506, -0.6056])\n>>> torch.add(a, 20)\n\
  tensor([ 20.0202,  21.0985,  21.3506,  19.3944])\n\n>>> b = torch.randn(4)\n>>> b\ntensor([-0.9732,\
  \ -0.3497,  0.6245,  0.4022])\n>>> c = torch.randn(4, 1)\n>>> c\ntensor([[ 0.3743],\n        [-1.7724],\n\
  \        [-0.5811],\n        [-0.8017]])\n>>> torch.add(b, c, alpha=10)\ntensor([[  2.7695,   3.3930,\
  \   4.3672,   4.1450],\n        [-18.6971, -18.0736, -17.0994, -17.3216],\n        [ -6.7845,  -6.1610,\
  \  -5.1868,  -5.4090],\n        [ -8.9902,  -8.3667,  -7.3925,  -7.6147]])\n\nAdditional constraints:\n\
  Supports broadcasting and type promotion.\n\nRequirements (SparkDistill / TritonBench harness):\n- Translate\
  \ the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120\n- Preserve numerics: include\
  \ torch.allclose vs the reference (atol/rtol appropriate for dtype)\n- Use @triton.jit + boundary masks;\
  \ prefer tl.make_tensor_descriptor over tl.make_block_ptr\n- Add @triton.autotune when there are meaningful\
  \ tile/block choices\n- Provide a launcher and a small self-contained test"
