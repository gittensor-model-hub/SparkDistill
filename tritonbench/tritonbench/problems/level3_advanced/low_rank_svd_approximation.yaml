title: Low Rank Svd Approximation
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `low_rank_svd_approximation`.\n\
  \nOperator description:\nComputes a rank-k approximation of a matrix using its Singular Value Decomposition\
  \ (SVD). The function retains the top-k singular values and corresponding singular vectors from the\
  \ SVD of A to form the approximation Ak. This low-rank approximation minimizes the Frobenius norm of\
  \ the difference between A and Ak among all rank-k matrices. Supports input of float, double, cfloat,\
  \ and cdouble dtypes, and batches of matrices.\n\nTarget Python signature / call pattern:\ndef low_rank_svd_approximation(A,\
  \ k, *, full_matrices=True, out=None) -> Tensor\n\nArgs:\n    A (Tensor): Tensor of shape `(*, m, n)`\
  \ where `*` is zero or more batch dimensions.\n    k (int): Rank of the approximation (must satisfy\
  \ `1 <= k <= min(m, n)`).\n    full_matrices (bool, optional): Controls whether to compute the full\
  \ or reduced SVD. Default: `True`.\n\nKeyword args:\n    out (Tensor, optional): Output tensor. Ignored\
  \ if `None`. Default: `None`.\n\nMathematical definition:\nA \\approx A_k = U_k \\Sigma_k V_k^{\\text{H}};\
  \ U_k \\in \\mathbb{K}^{m \\times k}; \\Sigma_k \\in \\mathbb{R}^{k \\times k}; V_k^{\\text{H}} \\in\
  \ \\mathbb{K}^{k \\times n}\n\nPyTorch reference snippet:\n```python\nU, S, Vh = torch.linalg.svd(A,\
  \ full_matrices=full_matrices); U_k = U[..., :k]; S_k = S[..., :k]; Vh_k = Vh[..., :k, :]; S_k_diag\
  \ = torch.diag_embed(S_k); A_k = U_k @ S_k_diag @ Vh_k; if out is not None: out.copy_(A_k); return out;\
  \ return A_k\n```\n\nExample / usage notes:\n>>> import torch\n>>> def low_rank_svd_approximation(A,\
  \ k, *, full_matrices=True, out=None):\n...     U, S, Vh = torch.linalg.svd(A, full_matrices=full_matrices)\n\
  ...     U_k = U[..., :k]\n...     S_k = S[..., :k]\n...     Vh_k = Vh[..., :k, :]\n...     S_k_diag\
  \ = torch.diag_embed(S_k)\n...     A_k = U_k @ S_k_diag @ Vh_k\n...     if out is not None:\n...   \
  \      out.copy_(A_k)\n...         return out\n...     return A_k\n>>> # Example with a 10x8 matrix\n\
  >>> A = torch.randn(10, 8)\n>>> k = 5\n>>> A_k = low_rank_svd_approximation(A, k)\n>>> A_k.shape\ntorch.Size([10,\
  \ 8])\n>>> # Check the approximation error\n>>> error = torch.norm(A - A_k)\n>>> print(\"Approximation\
  \ error:\", error.item())\nApproximation error: ...\n>>> # Compare with full matrix\n>>> A_full = low_rank_svd_approximation(A,\
  \ min(A.shape[-2], A.shape[-1]))\n>>> torch.allclose(A, A_full)\nTrue\n>>> # Example with a batch of\
  \ matrices\n>>> A_batch = torch.randn(4, 10, 8)\n>>> k = 3\n>>> A_k_batch = low_rank_svd_approximation(A_batch,\
  \ k)\n>>> A_k_batch.shape\ntorch.Size([4, 10, 8])\n>>> # Check approximation error for the batch\n>>>\
  \ error_batch = torch.norm(A_batch - A_k_batch, dim=(1, 2))\n>>> print(\"Approximation errors:\", error_batch)\n\
  tensor([...])\n\nAdditional constraints:\nSupports input of float, double, cfloat, and cdouble dtypes;\
  \ Batches of matrices are supported.\n\nRequirements (SparkDistill / TritonBench harness):\n- Translate\
  \ the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120\n- Preserve numerics: include\
  \ torch.allclose vs the reference (atol/rtol appropriate for dtype)\n- Use @triton.jit + boundary masks;\
  \ prefer tl.make_tensor_descriptor over tl.make_block_ptr\n- Add @triton.autotune when there are meaningful\
  \ tile/block choices\n- Provide a launcher and a small self-contained test"
