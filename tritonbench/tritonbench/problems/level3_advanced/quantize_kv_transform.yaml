id: quantize_kv_transform
level: 3
category: kernel_generation
title: Quantize Kv Transform
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `quantize_kv_transform.py` (repo: ModelTC/lightllm).


  Task description:

  The Triton kernel ''_fwd_kernel_destindex_copy_quantize_kv'' takes input tensors ''K'' and ''Dest_loc'',
  along with output tensors ''Out'' and ''Out_scale''. It processes elements in blocks defined by ''BLOCK_HEAD''
  and ''BLOCK_DMODEL'' which are powers of two based on dimensions of ''K''. The kernel computes per-block
  maximum absolute values to determine scales for quantization, scales the input data, converts it to
  int8, and stores both the quantized data and corresponding scales to the output tensors. Indices from
  ''Dest_loc'' determine positions in the output where processed blocks are stored. The ''destindex_copy_quantize_kv''
  function is a no-gradient PyTorch wrapper that calls the Triton kernel, initializing execution parameters
  such as grid size from ''seq_len'', determining block sizes, and specifying constraints on warps and
  stages.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  dtype_hint: float32 preferred unless the task requires lower precision
required_patterns:
