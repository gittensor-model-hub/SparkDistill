title: Determinant Lu
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `determinant_lu`.


  Operator description:

  Computes the determinant of a square matrix using LU decomposition. The function performs LU decomposition
  on a given square matrix A and calculates its determinant. It supports matrices over real or complex
  numbers and can handle batch dimensions. The determinant is computed as the product of the diagonal
  elements of the upper triangular matrix U from the LU decomposition, adjusted by the sign of the permutation
  matrix P if pivoting is used. The function assumes A is invertible and supports float, double, cfloat,
  and cdouble dtypes.


  Target Python signature / call pattern:

  determinant_lu(A, *, pivot=True, out=None) -> Tensor; A (Tensor): Tensor of shape `(*, n, n)` where
  `*` is zero or more batch dimensions consisting of square matrices. pivot (bool, optional): Controls
  whether to compute the LU decomposition with partial pivoting (`True`) or without pivoting (`False`).
  Default: `True`. out (Tensor, optional): Output tensor. Ignored if `None`. Default: `None`.


  Mathematical definition:

  \det(A) = \det(P) \cdot \prod_{i=1}^{n} U_{ii}; When pivot=False: \det(A) = \prod_{i=1}^{n} U_{ii}


  PyTorch reference snippet:

  ```python

  P, L, U = torch.linalg.lu(A, pivot=pivot); diag_U = torch.diagonal(U, dim1=-2, dim2=-1); det_U = torch.prod(diag_U,
  dim=-1); sign_P, _ = torch.linalg.slogdet(P); out.copy_(det)

  ```


  Example / usage notes:

  >>> import torch

  >>> def determinant_lu(A, *, pivot=True, out=None):

  ...     P, L, U = torch.linalg.lu(A, pivot=pivot)

  ...     diag_U = torch.diagonal(U, dim1=-2, dim2=-1)

  ...     det_U = torch.prod(diag_U, dim=-1)

  ...     if pivot:

  ...         sign_P, _ = torch.linalg.slogdet(P)

  ...         det = sign_P * det_U

  ...     else:

  ...         det = det_U

  ...     if out is not None:

  ...         out.copy_(det)

  ...         return out

  ...     return det

  >>> # Example with a 2x2 matrix

  >>> A = torch.tensor([[1., 2.], [3., 4.]])

  >>> determinant_lu(A)

  tensor(-2.)

  >>> # Compare with torch.det

  >>> torch.det(A)

  tensor(-2.)

  >>> # Example with a batch of matrices

  >>> A = torch.randn(2, 3, 3)

  >>> det = determinant_lu(A)

  >>> det.shape

  torch.Size([2])

  >>> # Compare with torch.det

  >>> torch.allclose(det, torch.det(A))

  True

  >>> # Example without pivoting (on GPU)

  >>> if torch.cuda.is_available():

  ...     A = torch.randn(3, 3, device=''cuda'')

  ...     determinant_lu(A, pivot=False)

  tensor(-0.3558, device=''cuda:0'')


  Additional constraints:

  This method assumes that A is invertible. If A is singular, the determinant will be zero, and the function
  may return `inf` or `nan` due to division by zero or numerical instability.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
