title: Leaky Relu Conv2D
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `leaky_relu_conv2d`.\n\
  \nOperator description:\nApplies a 2D convolution over the input tensor, followed by applying the Leaky\
  \ ReLU activation function element-wise to the result. This allows for both feature extraction and non-linear\
  \ activation in one step.\n\nTarget Python signature / call pattern:\ndef leaky_relu_conv2d(input, weight,\
  \ bias=None, stride=1, padding=0, dilation=1, groups=1, negative_slope=0.01, inplace=False) -> Tensor\n\
  \nMathematical definition:\nThe combined operation is defined as:\n\n.. math::\n    \\text{out} = \\\
  text{LeakyReLU}(\\text{conv2d}(\\text{input}))\n\nwhere the Leaky ReLU function is applied element-wise\
  \ as:\n\n.. math::\n    \\text{LeakyReLU}(x) = \\max(0, x) + \\text{negative\\_slope} \\times \\min(0,\
  \ x)\n\nPyTorch reference snippet:\n```python\nconv_result = torch.nn.functional.conv2d(input, weight,\
  \ bias=bias, stride=stride, padding=padding, dilation=dilation, groups=groups)\nreturn torch.nn.functional.leaky_relu(conv_result,\
  \ negative_slope=negative_slope, inplace=inplace)\n```\n\nExample / usage notes:\nExample::\n\n    >>>\
  \ import torch\n    >>> import torch.nn.functional as F\n    >>> # Define inputs, weights, and optional\
  \ bias\n    >>> inputs = torch.randn(1, 3, 5, 5)\n    >>> filters = torch.randn(6, 3, 3, 3)\n    >>>\
  \ bias = torch.randn(6)\n    >>> # Apply leaky_relu_conv2d with padding and bias\n    >>> result = leaky_relu_conv2d(inputs,\
  \ filters, bias=bias, padding=1, negative_slope=0.1)\n    >>> result.shape\n    torch.Size([1, 6, 5,\
  \ 5])\n\n    >>> # Apply leaky_relu_conv2d without bias and with stride 2\n    >>> result = leaky_relu_conv2d(inputs,\
  \ filters, stride=2)\n    >>> result.shape\n    torch.Size([1, 6, 2, 2])\n\nAdditional constraints:\n\
  The function combines 2D convolution and Leaky ReLU activation in one step, allowing for efficient computation.\n\
  \nRequirements (SparkDistill / TritonBench harness):\n- Translate the PyTorch reference into Triton\
  \ 3.7.1 kernels for Blackwell SM120\n- Preserve numerics: include torch.allclose vs the reference (atol/rtol\
  \ appropriate for dtype)\n- Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over\
  \ tl.make_block_ptr\n- Add @triton.autotune when there are meaningful tile/block choices\n- Provide\
  \ a launcher and a small self-contained test"
