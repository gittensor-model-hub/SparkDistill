title: Isfinite Kernel
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `isfinite_kernel.py` (repo: FlagOpen/FlagGems).\n\nTask description:\nThe code implements a\
  \ Triton-based operator for checking the finiteness of tensor elements. The `isfinite_func_wrapper_rank_1`\
  \ function is a wrapper that processes input and output tensors, ensuring they have matching shapes.\
  \ It uses heuristic functions to determine optimal tile sizes (`heuristics_for_tile_size`) and the number\
  \ of warps (`heuristics_for_num_warps`) for efficient execution. The function calculates task parameters\
  \ like `num_ctas` and `grid`, and then calls the Triton kernel `isfinite_func_kernel_rank_1`. \n\n \
  \           The `isfinite_func_kernel_rank_1` kernel operates on rank-1 tensors and employs either a\
  \ monolithic or grid-stride-loop approach based on `one_tile_per_cta`. The kernel leverages Triton's\
  \ pointer and block pointer types to load data elements from the input tensor into a Triton tensor (`in0`).\
  \ It uses boundary checking to prevent out-of-bounds accesses. The kernel applies the `isfinite_func`\
  \ function, which determines finiteness by calling `_isfinited` for fp64 or `_finitef` for other types,\
  \ casting appropriately. Results are stored back into the output tensor using the Triton `store` function.\
  \ The kernel dynamically adjusts its execution strategy based on the input size and structure, ensuring\
  \ both safety and performance.\n\nRequirements (SparkDistill / TritonBench harness):\n- Target Triton\
  \ 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor over deprecated\
  \ tl.make_block_ptr\n- Use @triton.jit kernels with correct boundary masking\n- Include @triton.autotune\
  \ with at least 3 configs when tile sizes matter\n- Provide a Python launcher + grid and a torch.allclose\
  \ correctness test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short note if you intentionally\
  \ skip autotune for a tiny elementwise kernel"
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  dtype_hint: float32 preferred unless the task requires lower precision
required_patterns:
- '@triton.jit'
- tl.load
- tl.store
- mask
- '@triton.autotune'
