id: rowwise_quantization_triton
level: 3
category: kernel_generation
title: Rowwise Quantization Triton
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `rowwise_quantization_triton.py` (repo: bitsandbytes-foundation/bitsandbytes).


  Task description:

  The _quantize_rowwise kernel in Triton is designed to perform row-wise quantization on a 2D input tensor,
  which is provided as a CUDA tensor. The kernel is executed per row, with each row processed independently
  by leveraging Triton''s parallel computing capabilities. It takes several parameters: x_ptr (pointer
  to the input tensor), output_ptr (pointer to the output tensor where quantized results are stored),
  output_maxs (pointer to an array where max values per row are stored), and n_elements, which is the
  total number of elements in the output tensor. Two compile-time constants, BLOCK_SIZE and P2, define
  the block size for processing and the power of 2 ceiling of the row size, respectively. The kernel computes
  the absolute values of elements within a row, finds the maximum value among them, and uses this max
  value to scale each element such that it fits into the int8 range via the function tl.extra.cuda.libdevice.llrint.
  The quantized values and max values are then stored in their respective output locations. The quantize_rowwise
  function acts as a wrapper to set up the necessary data structures, ensure the input is a CUDA tensor,
  and launch the kernel with appropriate grid size, which corresponds to the number of rows. It returns
  the quantized output tensor and a tensor containing the max values for each row.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
