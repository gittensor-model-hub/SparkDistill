id: matrix_reduction
level: 3
category: kernel_generation
title: Matrix Reduction
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `matrix_reduction.py` (repo: jeromeku/triton-aot).


  Task description:

  The kernel ''load_reduce_kernel'' is implemented using the Triton library to perform an element-wise
  reduction operation. It reads from an input matrix ''x_ptr'', computes the maximum value across each
  row (axis=1), and writes the result to an output vector ''y_ptr''. The function accepts several parameters:
  ''x_ptr'' and ''y_ptr'' are pointers to the input matrix and output vector, respectively; ''stride_xm''
  and ''stride_xn'' define the leading and secondary dimension strides for accessing the matrix; ''stride_y''
  is the stride for the output vector. ''BLOCK_M'' and ''BLOCK_N'' are compile-time constants defining
  the block dimensions. The kernel creates a block pointer to manage memory access efficiently, loads
  a block of data, computes the row-wise maxima using tl.max, and stores the output using tl.store. The
  ''load_reduce'' function tests this kernel by generating a random matrix ''x'' and an empty output vector
  ''y'', invoking the kernel with these parameters, and comparing the result against PyTorch''s max function
  for correctness using ''assert_close''.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  dtype_hint: float32 preferred unless the task requires lower precision
required_patterns:
- '@triton.jit'
- tl.load
- tl.store
- '@triton.autotune'
- torch.allclose
