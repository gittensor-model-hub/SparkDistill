title: Nested Loops Processing
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `nested_loops_processing.py` (repo: microsoft/triton-shared).


  Task description:

  The `nested3` function is a Triton kernel designed to perform complex memory operations in a nested
  loop manner, specifically within a 2x2 tile structure. Its main purpose is to load elements from an
  input array (`in_ptr`) and store them in an output array (`out_ptr`) using specific stride parameters
  (`stride_m` and `stride_n`) to calculate the correct memory offsets. The kernel employs three nested
  loops over indices i, j, and k. In each loop, it executes the following steps: (1) Calculate pointers
  `a_ptrs` and `c_ptrs` for the input and output using offsets derived from the loop indices and strides.
  (2) Load values from these calculated pointers using `tl.load`. (3) Store these loaded values to output
  pointers using `tl.store`. The pointer increment within nested loops ensures correct access patterns
  for intended operations. The `wrapper_nested3` function sets up the input tensor `x` and output tensor
  `output` on CUDA with specific dimensions derived from `n_rows` and `n_cols`. It defines a grid configuration
  for the Triton kernel execution, where grid size is determined by dividing `n_cols` by 4. Finally, it
  invokes the `nested3` kernel with the defined grid, passing in tensor data and computed strides, and
  prints the resultant output tensor.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
