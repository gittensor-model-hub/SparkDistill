title: Torch Permute Copy
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.permute_copy`.


  Operator description:

  Performs the same operation as torch.permute, which rearranges the dimensions of the input tensor according
  to the specified dims, but all output tensors are freshly created instead of aliasing the input.


  Target Python signature / call pattern:

  torch.permute_copy(input, dims) -> Tensor


  PyTorch reference snippet:

  ```python

  output = torch.permute_copy(input, dims)

  ```


  Additional constraints:

  Freshly created output tensors mean that the function does not create views, so changes to the output
  will not affect the input.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
