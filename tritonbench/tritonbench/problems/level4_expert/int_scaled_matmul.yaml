title: Int Scaled Matmul
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `int_scaled_matmul.py` (repo: pytorch/ao).\n\nTask description:\nThe provided Triton operator\
  \ code showcases the implementation of efficient GPU kernels for performing integer matrix multiplication\
  \ and scaled integer matrix multiplication using the Triton framework. The main constructs in the code\
  \ are two kernel functions and two corresponding launch functions.\n\n            1. `@triton.jit def\
  \ matmul_kernel_with_block_pointers(...)`: This kernel computes the matrix product C = A x B for matrices\
  \ A (MxK) and B (KxN) with result C (MxN). It uses block pointers to access matrix elements in chunks\
  \ defined by `BLOCK_M`, `BLOCK_N`, and `BLOCK_K`, promoting L2 cache reuse and minimizing global memory\
  \ access latency. The kernel organizes the computation through program IDs, which are mapped to blocks\
  \ of matrix C in a grouped ordering, enhancing data locality. The accumulation of results is done in\
  \ an `accumulator` of type `tl.int32` for precision.\n\n            2. `@triton.jit def scaled_matmul_kernel_with_block_pointers(...)`:\
  \ Extending the basic matrix multiplication, this kernel incorporates scaling of the output matrix by\
  \ a scale matrix `scales1`. The approach is similar to the previous kernel, with the matrix multiplication\
  \ results being scaled before being stored. The `EVEN_K` parameter allows optimization if K is a multiple\
  \ of the block size.\n\n            3. `def int_matmul_kernel(a, b, c, config)`: This is a host function\
  \ that prepares and launches the `matmul_kernel_with_block_pointers` kernel. It calculates the grid\
  \ size needed for the kernel execution based on the dimensions of the matrices A, B, and C, then invokes\
  \ the kernel with this configuration, passing the matrix data pointers and stride information alongside\
  \ execution parameters from the `config` object.\n\n            4. `def int_scaled_matmul_kernel(a,\
  \ b, scales1, c, config)`: Similar to `int_matmul_kernel`, this function sets up and launches the `scaled_matmul_kernel_with_block_pointers`\
  \ kernel. It includes handling for the scale matrix `scales1`, adjusting kernel parameters to account\
  \ for matrix sizes and execution configuration specified in the `config` object.\n\n            5. `class\
  \ Config`: This helper class encapsulates configuration settings for the kernel launches, such as `num_warps`,\
  \ `num_stages`, and `num_ctas`, which dictate how the kernel is executed on the GPU. These settings\
  \ can significantly impact the performance and efficiency of the computation on different GPU architectures.\n\
  \n            Overall, the code leverages Triton's ability to generate efficient GPU kernels with minimal\
  \ user intervention by handling boundary checks, block pointer manipulations, and execution configurations\
  \ automatically, aiming to achieve high-performance matrix operations suitable for integer arithmetic\
  \ on GPUs.\n\nRequirements (SparkDistill / TritonBench harness):\n- Target Triton 3.7.1 on workstation\
  \ Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr\n\
  - Use @triton.jit kernels with correct boundary masking\n- Include @triton.autotune with at least 3\
  \ configs when tile sizes matter\n- Provide a Python launcher + grid and a torch.allclose correctness\
  \ test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short note if you intentionally skip\
  \ autotune for a tiny elementwise kernel"
constraints:
