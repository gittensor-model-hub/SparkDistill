prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `bgmv_expand_slice.py` (repo: vllm-project/vllm).


  Task description:

  The Triton kernel `_bgmv_expand_slice_kernel` is designed to optimize the matrix-vector multiplication
  by splitting the N dimension into multiple blocks, improving performance for large hidden sizes. It
  operates on inputs from `input_ptr` (input matrix), `lora_ptr` (LoRA weight matrix), and `out_ptr` (output
  matrix), considering the batch and index information provided by `lora_indices`. The kernel computes
  matrix-vector products for each block and optionally accumulates these products into the output tensor.
  Key constants like `BLOCK_N`, `BLOCK_K`, `SPLIT_N`, `EVEN_K`, `ADD_INPUTS`, and `CAST_TYPE` control
  the block dimensions, input data handling, and type casting behavior. The `_bgmv_expand_slice` function,
  marked with `@torch.inference_mode()`, initializes tensor properties, validates shapes, and prepares
  the grid configuration before invoking the Triton kernel, ensuring data and operational integrity.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
