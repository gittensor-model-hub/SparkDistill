prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `matmul_leakyrelu_fp8.py` (repo: pytorch/benchmark).


  Task description:

  The Triton operator is composed of a kernel function `matmul_kernel` and a wrapper function `matmul`.
  The kernel performs matrix multiplication C = A x B, where A, B, and C have dimensions (M, K), (K, N),
  and (M, N) respectively. The kernel is optimized using Triton’s block mapping, with configurable block
  sizes: BLOCK_SIZE_M, BLOCK_SIZE_N, and BLOCK_SIZE_K. The operation supports activation functions, such
  as leaky ReLU, defined in `leaky_relu(x)`. The wrapper function `matmul` initializes the output matrix
  C, configures the execution grid based on input dimensions, and invokes the kernel. Key parameters include
  matrix dimensions and strides, alongside the activation function name, which determines if and how the
  activation is applied. The process involves splitting the computation into blocks and iterating over
  the K dimension to accumulate results. Finally, results are stored back into the appropriate locations
  in C using masked memory operations.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
