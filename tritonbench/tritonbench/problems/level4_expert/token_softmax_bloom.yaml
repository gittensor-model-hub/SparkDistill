title: Token Softmax Bloom
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `token_softmax_bloom.py` (repo: ModelTC/lightllm).


  Task description:

  The provided Triton code defines a custom forward-pass kernel function `_fwd_kernel_token_softmax` designed
  for computing the softmax of token logits with variable sequence lengths within a batch and multiple
  attention heads. The kernel is launched through the `token_softmax_fwd` function, which orchestrates
  the setup of the kernel''s execution parameters based on the input data. The main task of `_fwd_kernel_token_softmax`
  is to handle each batch and head independently using two-dimensional parallelism. It loads the appropriate
  segment of logits for each token sequence, applies a numerically stable softmax by subtracting the maximum
  logit value from each element, and normalizes by the total exponentiated sum. This operation efficiently
  computes softmax for padded sequences by masking invalid positions using Triton''s `mask` mechanism,
  which replaces them with negative infinity. The kernel parameters such as `num_warps` are dynamically
  adjusted based on the block size, enhancing performance across various sequence lengths.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
constraints:
