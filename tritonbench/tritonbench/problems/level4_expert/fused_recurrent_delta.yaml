id: fused_recurrent_delta
level: 4
category: kernel_generation
title: Fused Recurrent Delta
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `fused_recurrent_delta.py` (repo: sustcsonglin/flash-linear-attention).


  Task description:

  This Triton-based operation encapsulates fused recurrent computation which is split into two main kernels:
  ''fused_recurrent_fwd_kernel'' and ''fused_recurrent_bwd_kernel''. The forward kernel is designed to
  perform element-wise multiplication and accumulation operations to process sequences of data in a parallelized
  manner using Triton''s primitives. Key inputs are tensors q, k, and v, which stand for query, key, and
  value respectively, with additional parameters such as beta for scaling adjustments and initial_state
  for setting the initial hidden state. The operation also scales input queries using a specified or default
  scale factor. The output can optionally include the final state of the recurrent computation. The backward
  kernel computes gradients for each of the input tensors, leveraging Triton''s efficient parallel computing
  capabilities to perform operations such as tensor load, store, and arithmetic computations in reverse
  order to update weights during backpropagation. The FusedRecurrentFunction class integrates these kernels
  into PyTorch''s autograd mechanism, enabling them to be used as custom backward functions, with the
  ''fused_recurrent_delta_rule'' acting as the interface for user-friendly application. Key parameters
  include B (batch size), H (number of heads), T (sequence length), K and V (dimensions of the key and
  value tensors). BK and BV are block sizes for partitioning the computation, and grid specifies the execution
  configuration for Triton. The operations also account for different cases such as whether initial states
  are used or if beta has head-wise scaling, adapting the kernel execution path accordingly.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
constraints:
