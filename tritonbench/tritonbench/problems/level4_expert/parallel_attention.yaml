title: Parallel Attention
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `parallel_attention.py` (repo: sustcsonglin/flash-linear-attention).\n\nTask description:\n\
  The Triton-based custom operation consists of several key components designed to efficiently perform\
  \ parallel computations on batch tensor data, often seen in transformer models. The main kernel functions\
  \ are `parallel_rebased_fwd_kernel` and `parallel_rebased_bwd_kernel`. The forward kernel (`parallel_rebased_fwd_kernel`)\
  \ calculates attention scores by performing matrix multiplications between query (`q`), key (`k`), and\
  \ value (`v`) tensors, with scaling and optional normalization, and outputs the result into tensor `o`.\
  \ An additional tensor `z` holds a normalization factor computed from the scores. This kernel leverages\
  \ Triton's block-wise parallelism by dividing the computations into blocks of size defined by `BTL`,\
  \ `BTS`, `BK`, and `BV`.\n\n        The backward pass is handled by `parallel_rebased_bwd_kernel`, which\
  \ calculates gradients for input tensors using previously computed scores and the derivative outputs\
  \ (`do` and `dz`). This is further divided into two helper functions `_parallel_rebased_bwd_dq` and\
  \ `_parallel_rebased_bwd_dkv` to compute gradients for queries (`dq`) and key-value pairs (`dk`, `dv`)\
  \ respectively. These functions utilize the block pointer API to efficiently handle memory access patterns\
  \ for large tensor dimensions.\n\n        The Triton kernel operations are encapsulated within the `ParallelBasedFunction`\
  \ class that inherits from `torch.autograd.Function`, allowing for automatic differentiation. The `forward`\
  \ method initializes the output tensors and launches the forward kernel. The `backward` method prepares\
  \ the gradient tensors and invokes the backward kernel, returning gradients with respect to the inputs.\n\
  \n        The `parallel_rebased` function is a user-facing API that sets up and applies the custom operation.\
  \ It supports optional scaling (`use_scale`) and normalization (`use_normalize`) of outputs, with configurable\
  \ options such as `return_both` to return both output and normalization factors. It asserts that the\
  \ feature dimension does not exceed 128, ensuring compatibility with the defined Triton grid and block\
  \ sizes.\n\nRequirements (SparkDistill / TritonBench harness):\n- Target Triton 3.7.1 on workstation\
  \ Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr\n\
  - Use @triton.jit kernels with correct boundary masking\n- Include @triton.autotune with at least 3\
  \ configs when tile sizes matter\n- Provide a Python launcher + grid and a torch.allclose correctness\
  \ test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short note if you intentionally skip\
  \ autotune for a tiny elementwise kernel"
