title: Torch Linalg Ldl Factor
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.linalg.ldl_factor`.\n\
  \nOperator description:\nComputes a compact representation of the LDL factorization of a Hermitian or\
  \ symmetric (possibly indefinite) matrix. Supports input of float, double, cfloat and cdouble dtypes.\
  \ Also supports batches of matrices, and if A is a batch of matrices then the output has the same batch\
  \ dimensions. When A is complex valued it can be Hermitian (hermitian=True) or symmetric (hermitian=False).\
  \ The factorization is of the form A = L D L^T. If hermitian is True then transpose operation is the\
  \ conjugate transpose. L (or U) and D are stored in compact form in LD. They follow the format specified\
  \ by LAPACK's sytrf function. These tensors may be used in torch.linalg.ldl_solve to solve linear systems.\n\
  \nTarget Python signature / call pattern:\nlinalg.ldl_factor(A, *, hermitian=False, out=None) -> (Tensor,\
  \ Tensor)\n\nArgs:\n    A (Tensor): tensor of shape `(*, n, n)` where `*` is zero or more batch dimensions\
  \ consisting of symmetric or Hermitian matrices.\n\nKeyword args:\n    hermitian (bool, optional): whether\
  \ to consider the input to be Hermitian or symmetric. For real-valued matrices, this switch has no effect.\
  \ Default: `False`.\n    out (tuple, optional): tuple of two tensors to write the output to. Ignored\
  \ if `None`. Default: `None`.\n\nReturns:\n    A named tuple `(LD, pivots)`.\n\nMathematical definition:\n\
  A = L D L^T\n\nPyTorch reference snippet:\n```python\ntorch.linalg.ldl_factor(A)\n```\n\nExample / usage\
  \ notes:\nExamples::\n\n    >>> A = torch.randn(3, 3)\n    >>> A = A @ A.mT # make symmetric\n    >>>\
  \ A\n    tensor([[7.2079, 4.2414, 1.9428],\n            [4.2414, 3.4554, 0.3264],\n            [1.9428,\
  \ 0.3264, 1.3823]])\n    >>> LD, pivots = torch.linalg.ldl_factor(A)\n    >>> LD\n    tensor([[ 7.2079,\
  \  0.0000,  0.0000],\n            [ 0.5884,  0.9595,  0.0000],\n            [ 0.2695, -0.8513,  0.1633]])\n\
  \    >>> pivots\n    tensor([1, 2, 3], dtype=torch.int32)\n\nAdditional constraints:\nWhen inputs are\
  \ on a CUDA device, this function synchronizes that device with the CPU. For a version of this function\
  \ that does not synchronize, see torch.linalg.ldl_factor_ex.\n\nRequirements (SparkDistill / TritonBench\
  \ harness):\n- Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120\n- Preserve\
  \ numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)\n- Use @triton.jit\
  \ + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr\n- Add @triton.autotune\
  \ when there are meaningful tile/block choices\n- Provide a launcher and a small self-contained test"
