title: Llama Ff Triton
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `llama_ff_triton.py` (repo: ELS-RD/kernl).


  Task description:

  The ''ff_llama'' Triton kernel performs a complex fused operation involving matrix multiplications and
  element-wise activation functions. The operation specifically computes F.silu(w1(x)) * w3(x), where
  ''w1'' and ''w3'' are linear layer weights. The kernel integrates root mean square (RMS) scaling using
  an auxiliary weight ''rms_w'', ensuring numerical stability with an epsilon parameter ''EPS'' during
  normalization.


  The kernel''s loop iteratively loads chunks of the input matrix ''x'', weights ''w1'', ''w3'', and RMS
  weights. It computes the accumulated sums for two different matrix multiplications (''acc1'' and ''acc2'')
  within tiled regions defined by ''BLOCK_SIZE_M'', ''BLOCK_SIZE_N'', and ''BLOCK_SIZE_K''. The kernel
  considers whether to use FP8 precision based on weight data types.


  Normalization is applied using L2-norm to stabilize the results, followed by combining both accumulators
  with a scaled sigmoid activation to produce the final output. The output is stored conditionally, ensuring
  it respects the tensor dimensions.


  The ''kernel_ff'' function wraps this kernel, handling the reshaping and preparation of inputs. It asserts
  the correct types and shapes, transposes weight matrices, and sets up grid dimensions for parallel execution
  before invoking the Triton kernel. The grid lambda function calculates the grid size required based
  on input sizes and block sizes, ensuring efficient tiling for GPU execution.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
