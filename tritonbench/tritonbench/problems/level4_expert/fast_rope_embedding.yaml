title: Fast Rope Embedding
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `fast_rope_embedding.py` (repo: unslothai/unsloth).\n\nTask description:\nThe provided Triton\
  \ kernel, `_rope_embedding`, and its associated Python wrapper function, `Fast_RoPE_Embedding`, are\
  \ designed to compute the Rotary Positional Encoding (RoPE) on input matrices, particularly for query\
  \ (`Q`) and key (`K`) matrices in transformer architectures. The `_rope_embedding` kernel is written\
  \ in Triton, a language for writing efficient GPU compute kernels, and it leverages parallel execution\
  \ to accelerate the RoPE computation. \n\n            The kernel takes multiple parameters, including:\n\
  \            - `Q`: the query tensor to be transformed.\n            - `Q_row_stride`: the stride between\
  \ rows in the `Q` tensor.\n            - `cos`, `sin`: tensors containing precomputed cosine and sine\
  \ values for rotation.\n            - `cos_row_stride`, `sin_row_stride`: respective strides for cosine\
  \ and sine tensors.\n            - `seqlen`: sequence length constraint.\n            - `head_dim`:\
  \ dimension of each head in the multi-head attention mechanism.\n            - `n_heads`: number of\
  \ attention heads.\n            - `BACKWARD_PASS`: a constant indicating if the backward pass is computed.\n\
  \            - `BLOCK_SIZE`: the block size for Triton kernel execution, determining the parallel execution\
  \ granularity.\n\n            Within the kernel, each thread computes parts of the RoPE transformation\
  \ for segments of the input tensor. The operation involves computing `Q * cos + rotate_half(Q) * sin`,\
  \ where `rotate_half(Q)` denotes a transformation involving half-head dimension offsets.\n\n       \
  \     The `Fast_RoPE_Embedding` class manages the forward and backward passes for autograd in PyTorch.\
  \ In the `forward` method, input tensors are reshaped, processed by `_rope_embedding`, and reshaped\
  \ back to their original form. The backward method processes gradients, passing them through the RoPE\
  \ transformation for backpropagation.\n\n            Finally, the `fast_rope_embedding` function applies\
  \ this transformation to both query and key matrices, ensuring compatibility with transformer-based\
  \ models. It utilizes the `transpose` operation to ensure correct dimensions for the RoPE computation.\n\
  \nRequirements (SparkDistill / TritonBench harness):\n- Target Triton 3.7.1 on workstation Blackwell\
  \ (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr\n- Use\
  \ @triton.jit kernels with correct boundary masking\n- Include @triton.autotune with at least 3 configs\
  \ when tile sizes matter\n- Provide a Python launcher + grid and a torch.allclose correctness test\n\
  - Use fp32 accumulators for tl.dot reductions\n- Print a short note if you intentionally skip autotune\
  \ for a tiny elementwise kernel"
