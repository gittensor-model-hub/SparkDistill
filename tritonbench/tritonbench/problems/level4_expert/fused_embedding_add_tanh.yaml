title: Fused Embedding Add Tanh
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `fused_embedding_add_tanh`.\n\
  \nOperator description:\nPerforms a fused operation combining embedding lookup, element-wise addition,\
  \ and tanh activation. The function retrieves embeddings from an embedding matrix using input indices,\
  \ adds another tensor to these embeddings, and applies a tanh activation function to the result. It\
  \ supports options for padding indices, max norm for embeddings, scaling gradients by frequency, and\
  \ sparse gradients.\n\nTarget Python signature / call pattern:\nfused_embedding_add_tanh(input_indices,\
  \ weight, other, *, padding_idx=None, max_norm=None, norm_type=2.0, scale_grad_by_freq=False, sparse=False,\
  \ out=None) -> Tensor; input_indices (LongTensor): Tensor containing indices into the embedding matrix,\
  \ of arbitrary shape (*); weight (Tensor): The embedding matrix of shape (V, D), where V is the number\
  \ of embeddings (vocabulary size), and D is the embedding dimension; other (Tensor): Tensor to be added\
  \ to the embeddings, must be broadcastable to the shape of E; padding_idx (int, optional): If specified,\
  \ the entries at `padding_idx` do not contribute to the gradient; max_norm (float, optional): If given,\
  \ each embedding vector with norm larger than `max_norm` is renormalized to have norm `max_norm`; norm_type\
  \ (float, optional): The p-norm to compute for the `max_norm` option. Default: `2.0`; scale_grad_by_freq\
  \ (bool, optional): If `True`, scale gradients by the inverse of frequency of the words in the mini-batch.\
  \ Default: `False`; sparse (bool, optional): If `True`, gradient w.r.t. `weight` will be a sparse tensor.\
  \ Default: `False`; out (Tensor, optional): Output tensor. Ignored if `None`. Default: `None`\n\nMathematical\
  \ definition:\nGiven input indices \\mathbf{i}, embedding weight matrix W, and tensor O, the function\
  \ computes:\n\\[\n\\begin{align*}\nE &= \\text{Embedding}(\\mathbf{i}, W) \\\\\nS &= E + O \\\\\nY &=\
  \ \\tanh(S)\n\\end{align*}\n\\]\n\nPyTorch reference snippet:\n```python\nE = torch.nn.functional.embedding(input_indices,\
  \ weight, padding_idx=padding_idx, max_norm=max_norm, norm_type=norm_type, scale_grad_by_freq=scale_grad_by_freq,\
  \ sparse=sparse)\nS = torch.add(E, other)\nY = torch.nn.functional.tanh(S)\nif out is not None:\n  \
  \  out.copy_(Y)\n    return out\nreturn Y\n```\n\nExample / usage notes:\n```python\nimport torch\n\
  import torch.nn.functional as F\n\n# Example usage\n# Embedding matrix of size (vocab_size, embedding_dim)\n\
  vocab_size = 10\nembedding_dim = 3\nweight = torch.randn(vocab_size, embedding_dim)\n\n# Input indices\
  \ (arbitrary shape)\ninput_indices = torch.tensor([[1, 2, 4, 5], [4, 3, 2, 9]])\n\n# Other tensor to\
  \ add, broadcastable to embedding output\nother = torch.randn_like(torch.nn.functional.embedding(input_indices,\
  \ weight))\n\n# Call the fused function\noutput = fused_embedding_add_tanh(input_indices, weight, other)\n\
  print(\"Output shape:\", output.shape)\n# Output shape: torch.Size([2, 4, 3])\n```\n\nAdditional constraints:\n\
  - The `other` tensor must be broadcastable to the shape of the embeddings retrieved by `torch.nn.functional.embedding`.\n\
  - All parameters related to `torch.nn.functional.embedding` are passed through to allow for options\
  \ like `padding_idx`, `max_norm`, etc.\n- This function supports autograd for gradient computation.\n\
  - All operations are differentiable and support backpropagation.\n\nRequirements (SparkDistill / TritonBench\
  \ harness):\n- Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120\n- Preserve\
  \ numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)\n- Use @triton.jit\
  \ + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr\n- Add @triton.autotune\
  \ when there are meaningful tile/block choices\n- Provide a launcher and a small self-contained test"
