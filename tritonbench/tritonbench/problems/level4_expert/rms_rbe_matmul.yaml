title: Rms Rbe Matmul
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `rms_rbe_matmul.py` (repo: ELS-RD/kernl).


  Task description:

  The Triton kernel `rms_matmul_rbe` executes a specialized matrix multiplication that incorporates RMS
  normalization and optionally applies rotary embeddings. The kernel takes in pointers to the input tensor
  `x`, the transposed weight matrix `w`, and an auxiliary RMS weight `rms_w`. The operation proceeds in
  a block-wise manner, defined by `BLOCK_SIZE_M`, `BLOCK_SIZE_N`, and `BLOCK_SIZE_K`, iterating over batches
  and computing each element of the output matrix. RMS normalization is applied to input rows before matrix
  multiplication, by computing the sum of squares, deriving the mean, and applying the reciprocal square
  root to normalize. If specified, rotary embeddings adjust results based on token position and angle
  `THETA`. The wrapper function `rms_matmul_rbe_wrapper` sets up parameters, manages data types, and launches
  the Triton kernel, ensuring the input and output tensors are correctly formatted and aligned for transformer
  layers, considering the model''s dimensions like batch size, number of attention heads, and head size.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
