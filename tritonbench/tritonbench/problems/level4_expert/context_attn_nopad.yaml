title: Context Attn Nopad
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `context_attn_nopad.py` (repo: S-LoRA/S-LoRA).


  Task description:

  The kernel `_fwd_kernel` is part of a Triton operator for computing scaled dot-product attention. It
  accepts tensors Q (queries), K (keys), V (values), and additional parameters like `sm_scale`, `B_Start_Loc`,
  and `B_Seqlen` to handle batches of varying sequence lengths. The `context_attention_fwd` function initializes
  and dispatches this kernel, with arguments including strides for Q, K, V, and Out, which help index
  these multidimensional tensors correctly within the kernel. Inside `_fwd_kernel`, a blocking strategy
  defined by constants BLOCK_M, BLOCK_DMODEL, and BLOCK_N is used to partition the computation, enhancing
  parallelism and memory efficiency. The kernel calculates attention scores by dot-product of queries
  and keys, scales them, and applies a softmax operation. It accumulates results to form the output by
  weighting value vectors V accordingly. The `context_attention_fwd` computes the softmax scaling factor
  `sm_scale` as the inverse square root of query depth, ensuring numeric stability. The grid for launching
  the kernel is determined by the batch size, number of heads, and input length, and it adapts the number
  of warps based on key length Lk.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
