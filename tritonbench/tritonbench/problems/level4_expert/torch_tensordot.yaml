title: Torch Tensordot
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.tensordot`.\n\
  \nOperator description:\nReturns a contraction of a and b over multiple dimensions. It implements a\
  \ generalized matrix product.\n\nTarget Python signature / call pattern:\ndef tensordot(a: Tensor, b:\
  \ Tensor, dims: Union[int, Tuple[List[int], List[int]], List[List[int]]]) -> Tensor: \nArgs:\n    a\
  \ (Tensor): Left tensor to contract\n    b (Tensor): Right tensor to contract\n    dims (int or Tuple[List[int],\
  \ List[int]] or List[List[int]] containing two lists or Tensor): number of dimensions to contract or\
  \ explicit lists of dimensions for a and b respectively\n\nMathematical definition:\nr_{i_0,...,i_{m-d},\
  \ i_d,...,i_n} = \\sum_{k_0,...,k_{d-1}} a_{i_0,...,i_{m-d},k_0,...,k_{d-1}} \\times b_{k_0,...,k_{d-1},\
  \ i_d,...,i_n}.\n\nPyTorch reference snippet:\n```python\ntorch.tensordot(a, b, dims)\n```\n\nExample\
  \ / usage notes:\n>>> a = torch.arange(60.).reshape(3, 4, 5)\n>>> b = torch.arange(24.).reshape(4, 3,\
  \ 2)\n>>> torch.tensordot(a, b, dims=([1, 0], [0, 1]))\ntensor([[4400., 4730.],\n[4532., 4874.],\n[4664.,\
  \ 5018.],\n[4796., 5162.],\n[4928., 5306.]])\n\n>>> # xdoctest: +REQUIRES(env:TORCH_DOCTEST_CUDA)\n\
  >>> a = torch.randn(3, 4, 5, device='cuda')\n>>> b = torch.randn(4, 5, 6, device='cuda')\n>>> c = torch.tensordot(a,\
  \ b, dims=2).cpu()\ntensor([[ 8.3504, -2.5436, 6.2922, 2.7556, -1.0732, 3.2741],\n[ 3.3161, 0.0704,\
  \ 5.0187, -0.4079, -4.3126, 4.8744],\n[ 0.8223, 3.9445, 3.2168, -0.2400, 3.4117, 1.7780]])\n\n>>> a\
  \ = torch.randn(3, 5, 4, 6)\n>>> b = torch.randn(6, 4, 5, 3)\n>>> torch.tensordot(a, b, dims=([2, 1,\
  \ 3], [1, 2, 0]))\ntensor([[ 7.7193, -2.4867, -10.3204],\n[ 1.5513, -14.4737, -6.5113],\n[ -0.2850,\
  \ 4.2573, -3.5997]])\n\nAdditional constraints:\nThe sizes in the contracted dimensions must match,\
  \ but broadcasted dimensions are handled.\n\nRequirements (SparkDistill / TritonBench harness):\n- Translate\
  \ the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120\n- Preserve numerics: include\
  \ torch.allclose vs the reference (atol/rtol appropriate for dtype)\n- Use @triton.jit + boundary masks;\
  \ prefer tl.make_tensor_descriptor over tl.make_block_ptr\n- Add @triton.autotune when there are meaningful\
  \ tile/block choices\n- Provide a launcher and a small self-contained test"
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  params_cnt: 3
  torch_cnt: 1
  func_inputs: "def tensordot(a: Tensor, b: Tensor, dims: Union[int, Tuple[List[int], List[int]], List[List[int]]])\
    \ -> Tensor: \nArgs:\n    a (Tensor): Left tensor to contract\n    b (Tensor): Right tensor to contract\n\
    \    dims (int or Tuple[List[int], List[int]] or List[List[int]] containing two lists or Tensor):\
    \ number of dimensions to contract or explicit lists of dimensions for a and b respectively"
