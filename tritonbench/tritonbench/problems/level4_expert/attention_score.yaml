id: attention_score
level: 4
category: kernel_debugging
title: Attention Score
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `attention_score.py` (repo: microsoft/MInference).\n\nTask description:\nThe `_score_kernel`\
  \ is a Triton-based GPU kernel designed to compute attention scores in transformer models. It uses a\
  \ block-wise approach to leverage GPU parallelism and optimize memory access. The main inputs are the\
  \ matrices `Q` (query), `K` (key), and `M` (mask), with the result being stored in `Out`. The kernel\
  \ iterates over blocks defined by `BLOCK_M` and `BLOCK_N`, performing operations in these fixed-size\
  \ submatrices.\n\n            Key computations involve loading query blocks `Q` and key blocks `K`,\
  \ calculating the dot product to get the score matrix `qk`, and scaling this matrix by a factor `sm_scale`\
  \ which accounts for the softmax operation. It includes conditions for sliding window attention, checking\
  \ bounds to handle non-even dimensions, and reducing results into the output vector `o`.\n\n       \
  \     The function `get_score` is a Python wrapper function that prepares inputs and executes the kernel.\
  \ It determines grid size based on the dimensions of K and Q. If there is a resource constraint error\
  \ due to large block sizes, it reduces `BLOCK_M` and `BLOCK_N` by half and retries execution. This function\
  \ also calculates the scale factor for attention (`sm_scale`) and manages additional parameters like\
  \ sliding window configurations.\n\nRequirements (SparkDistill / TritonBench harness):\n- Target Triton\
  \ 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor over deprecated\
  \ tl.make_block_ptr\n- Use @triton.jit kernels with correct boundary masking\n- Include @triton.autotune\
  \ with at least 3 configs when tile sizes matter\n- Provide a Python launcher + grid and a torch.allclose\
  \ correctness test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short note if you intentionally\
  \ skip autotune for a tiny elementwise kernel"
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  dtype_hint: float32 preferred unless the task requires lower precision
required_patterns:
- '@triton.jit'
- mask
