title: Rope Embedding
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `rope_embedding.py` (repo: Lightning-AI/litgpt).\n\nTask description:\nThis Triton code provides\
  \ an implementation of the RoPE (Rotary Position Embeddings) using a combination of Python and a Triton\
  \ JIT-compiled kernel. It is intended to perform this computation efficiently on a GPU. The key components\
  \ include:\n\n1. `calculate_settings(n)` function:\n   - Purpose: Computes optimal block size and number\
  \ of warps for executing the Triton kernel based on the input dimension `n`.\n   - It calculates the\
  \ next power of two for `n` to determine `BLOCK_SIZE` and decides the appropriate number of `num_warps`\
  \ based on this block size. It raises a runtime error if the block size exceeds the maximum allowed\
  \ size `MAX_FUSED_SIZE`.\n\n2. `_rope_embedding` Triton kernel:\n   - Signature: `_rope_embedding(Q,\
  \ Q_row_stride, cos, cos_row_stride, sin, sin_row_stride, seqlen, head_dim, n_heads, BACKWARD_PASS,\
  \ BLOCK_SIZE, ROPE_GROUP_SIZE)`\n   - Role: Executes the computation of the RoPE embeddings. This involves\
  \ multiplying the input `Q` with `cos` and `sin` matrices, applying a rotation to half of `Q`, and adjusting\
  \ based on the `BACKWARD_PASS` flag.\n   - The kernel leverages the Triton language to parallelize computations\
  \ across rows and groups of heads. It uses `tl.load` and `tl.store` for memory operations with specified\
  \ masks to ensure only valid operations are performed.\n\n3. `_rope_embedding_forward_impl(Q, cos, sin)`:\n\
  \   - Functionality: Handles the forward pass for RoPE embedding. This involves preparing data, calculating\
  \ necessary settings using `calculate_settings`, and launching the Triton kernel `_rope_embedding`.\n\
  \   - Prepares the data by reshaping and transposing `Q` for compatibility with the kernel's expectations.\
  \ Determines the number of groups (`n_groups`) by dividing the number of heads by `ROPE_GROUP_SIZE`.\n\
  \n4. `_rope_embedding_backward_impl(dY, cos, sin, n_groups, BLOCK_SIZE, num_warps)`:\n   - Purpose:\
  \ Facilitates the backward pass (gradient computation) for the RoPE operation, useful in training scenarios.\n\
  \   - Similarly reshapes and transposes `dY` to call the Triton kernel with appropriate parameters,\
  \ setting `BACKWARD_PASS` to `True` to reverse the transformation logic.\n\nCommon variables:\n- `Q`:\
  \ The input tensor for the forward pass.\n- `cos`, `sin`: Tensors holding the cosine and sine values\
  \ used in the computation.\n- `seqlen`, `head_dim`, `n_heads`: Dimensions describing sequence length,\
  \ head dimension, and number of attention heads.\n- `BLOCK_SIZE`, `num_warps`: Parameters determined\
  \ through heuristics to optimize GPU execution.\n\nRequirements (SparkDistill / TritonBench harness):\n\
  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor\
  \ over deprecated tl.make_block_ptr\n- Use @triton.jit kernels with correct boundary masking\n- Include\
  \ @triton.autotune with at least 3 configs when tile sizes matter\n- Provide a Python launcher + grid\
  \ and a torch.allclose correctness test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short\
  \ note if you intentionally skip autotune for a tiny elementwise kernel"
constraints:
