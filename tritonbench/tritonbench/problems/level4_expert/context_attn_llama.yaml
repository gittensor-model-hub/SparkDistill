title: Context Attn Llama
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `context_attn_llama.py` (repo: ModelTC/lightllm).\n\nTask description:\nThe Triton kernel `_fwd_kernel`\
  \ is designed to execute a context attention mechanism, essential in transformer architectures. \n \
  \       It accepts tensors Q, K, and V representing queries, keys, and values, respectively, alongside\
  \ several metadata and stride parameters to account for complex batching and sequence operations. \n\
  \        The kernel handles operations for attention computation: it initially calculates dot products\
  \ between Q and K, scales these products by `sm_scale`, and applies an exponential function to obtain\
  \ softmax values. \n        The calculated attention scores are then utilized to weight the values in\
  \ V, and the results are accumulated and stored in the `Out` tensor. \n        This process involves\
  \ masking techniques to handle variable sequence lengths and prompt caching, ensuring causal ordering.\
  \ \n        The kernel leverages Triton's parallel execution capabilities through grid and block configurations\
  \ determined by inputs such as `BLOCK_M`, `BLOCK_N`, and `kv_group_num`.\n\n        The `context_attention_fwd`\
  \ function orchestrates the execution of the Triton kernel by setting up the computational environment.\
  \ \n        It calculates the appropriate block size `BLOCK_M` based on whether the Tesla architecture\
  \ is in use, establishes shape constraints, and determines the scaling factor `sm_scale` using the inverse\
  \ square root of the query dimension `Lq`, adjusted by a constant for compatibility with Triton's exponential\
  \ function. \n        The function configures execution parameters, including batch and head dimensions,\
  \ through a grid lambda function, and invokes the Triton kernel with all required inputs and meta parameters,\
  \ such as tensor strides, kv head grouping, and block dimensionality. \n        This setup ensures efficient\
  \ parallel attention computation across potentially large input sequences.\n\nRequirements (SparkDistill\
  \ / TritonBench harness):\n- Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer\
  \ tl.make_tensor_descriptor over deprecated tl.make_block_ptr\n- Use @triton.jit kernels with correct\
  \ boundary masking\n- Include @triton.autotune with at least 3 configs when tile sizes matter\n- Provide\
  \ a Python launcher + grid and a torch.allclose correctness test\n- Use fp32 accumulators for tl.dot\
  \ reductions\n- Print a short note if you intentionally skip autotune for a tiny elementwise kernel"
constraints:
