title: Torch Fft Ifftshift
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.fft.ifftshift`.\n\
  \nOperator description:\nThe function torch.fft.ifftshift is the inverse of torch.fft.fftshift. It rearranges\
  \ the elements of the input tensor, which is in FFT order, such that the zero-frequency component is\
  \ moved back to the original position. This is useful for preparing data for inverse FFT operations.\
  \ The function can rearrange specified dimensions or all dimensions by default.\n\nTarget Python signature\
  \ / call pattern:\nifftshift(input, dim=None) -> Tensor\n\nArgs:\n    input (Tensor): the tensor in\
  \ FFT order\n    dim (int, Tuple[int], optional): The dimensions to rearrange.\n        Only dimensions\
  \ specified here will be rearranged, any other dimensions\n        will be left in their original order.\n\
  \        Default: All dimensions of input.\n\nPyTorch reference snippet:\n```python\ntorch.fft.ifftshift(shifted)\n\
  ```\n\nExample / usage notes:\n>>> f = torch.fft.fftfreq(5)\n>>> f\ntensor([ 0.0000,  0.2000,  0.4000,\
  \ -0.4000, -0.2000])\n\nA round-trip through :func:`~torch.fft.fftshift` and\n:func:`~torch.fft.ifftshift`\
  \ gives the same result:\n\n>>> shifted = torch.fft.fftshift(f)\n>>> torch.fft.ifftshift(shifted)\n\
  tensor([ 0.0000,  0.2000,  0.4000, -0.4000, -0.2000])\n\nAdditional constraints:\nInverse of torch.fft.fftshift.\n\
  \nRequirements (SparkDistill / TritonBench harness):\n- Translate the PyTorch reference into Triton\
  \ 3.7.1 kernels for Blackwell SM120\n- Preserve numerics: include torch.allclose vs the reference (atol/rtol\
  \ appropriate for dtype)\n- Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over\
  \ tl.make_block_ptr\n- Add @triton.autotune when there are meaningful tile/block choices\n- Provide\
  \ a launcher and a small self-contained test"
