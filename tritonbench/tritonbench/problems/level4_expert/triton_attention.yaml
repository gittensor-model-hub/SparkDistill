title: Triton Attention
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `triton_attention.py` (repo: jeromeku/triton-aot).\n\nTask description:\nThis Triton implementation\
  \ consists of functions designed to optimize the scaled dot-product attention calculation found in transformer\
  \ models. The core components are `_fwd_kernel`, `_bwd_preprocess`, `_bwd_kernel`, and the wrapper class\
  \ `_attention`.\n\n            `_fwd_kernel` is the forward computation kernel that performs matrix\
  \ multiplication between query `Q` and key `K` to produce attention scores, which are then scaled by\
  \ `sm_scale` and masked where necessary. Softmax is applied to these scores to obtain the attention\
  \ weights. These weights are used to compute the weighted sum of the value `V` tensor, yielding the\
  \ final output stored in `Out`. The function manages data using block pointers (`q_tile_ptr`, `k_tile_ptr`,\
  \ `v_tile_ptr`) which efficiently load and store data in smaller manageable blocks. Block shapes (`BLOCK_M`,\
  \ `BLOCK_N`, `BLOCK_DMODEL`) define the granularity of these operations.\n\n            `_bwd_preprocess`\
  \ prepares the gradient of the output (`DO`) for backpropagation, ensuring numerical stability by scaling\
  \ it with the normalization constant `L`, and computes a delta factor for later use in gradient computation.\n\
  \n            `_bwd_kernel` computes the gradients for the input tensors `Q`, `K`, `V` using the chain\
  \ rule. It processes data in tiles, recalculates necessary softmax probabilities, and uses them to compute\
  \ gradients with respect to the inputs. The processed gradients are accumulated and stored back in their\
  \ respective tensors.\n\n            The `_attention` class interfaces with PyTorch's autograd to manage\
  \ forward and backward passes. It configures the Triton grid to split the data for parallel processing,\
  \ ensures appropriate memory allocation for intermediate variables like `L`, `m`, and sets parameters\
  \ such as `BLOCK`, `num_warps`, and `num_stages` to balance the workload across available resources.\n\
  \n            Constants like `BLOCK` (often set to 128) define the tile size for the kernels, impacting\
  \ both performance and memory efficiency. `ctx` is used to pass necessary information between forward\
  \ and backward functions, enabling efficient gradient calculation in PyTorch's automatic differentiation\
  \ system.\n\nRequirements (SparkDistill / TritonBench harness):\n- Target Triton 3.7.1 on workstation\
  \ Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr\n\
  - Use @triton.jit kernels with correct boundary masking\n- Include @triton.autotune with at least 3\
  \ configs when tile sizes matter\n- Provide a Python launcher + grid and a torch.allclose correctness\
  \ test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short note if you intentionally skip\
  \ autotune for a tiny elementwise kernel"
constraints:
