id: torch_linalg_solve
level: 4
category: kernel_translation
title: Torch Linalg Solve
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.linalg.solve`.


  Operator description:

  Computes the solution of a square system of linear equations with a unique solution. Supports inputs
  of float, double, cfloat and cdouble dtypes. Also supports batches of matrices, and if the inputs are
  batches of matrices then the output has the same batch dimensions. Assumes that matrix A is invertible.


  Target Python signature / call pattern:

  A (Tensor), B (Tensor), *, left (bool, optional), out (Tensor, optional)


  Mathematical definition:

  AX = B; XA = B


  PyTorch reference snippet:

  ```python

  torch.linalg.solve(A, B)

  ```


  Example / usage notes:

  >>> A = torch.randn(3, 3)

  >>> b = torch.randn(3)

  >>> x = torch.linalg.solve(A, b)

  >>> torch.allclose(A @ x, b)

  True

  >>> A = torch.randn(2, 3, 3)

  >>> B = torch.randn(2, 3, 4)

  >>> X = torch.linalg.solve(A, B)

  >>> X.shape

  torch.Size([2, 3, 4])

  >>> torch.allclose(A @ X, B)

  True


  >>> A = torch.randn(2, 3, 3)

  >>> b = torch.randn(3, 1)

  >>> x = torch.linalg.solve(A, b) # b is broadcasted to size (2, 3, 1)

  >>> x.shape

  torch.Size([2, 3, 1])

  >>> torch.allclose(A @ x, b)

  True

  >>> b = torch.randn(3)

  >>> x = torch.linalg.solve(A, b) # b is broadcasted to size (2, 3)

  >>> x.shape

  torch.Size([2, 3])

  >>> Ax = A @ x.unsqueeze(-1)

  >>> torch.allclose(Ax, b.unsqueeze(-1).expand_as(Ax))

  True


  Additional constraints:

  This function computes `X = A.inverse() @ B` in a faster and more numerically stable way than performing
  the computations separately. When inputs are on a CUDA device, this function synchronizes that device
  with the CPU. For a version of this function that does not synchronize, see `torch.linalg.solve_ex`.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
