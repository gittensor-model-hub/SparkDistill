title: Fused Instance Norm Selu Conv2D
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `fused_instance_norm_selu_conv2d`.


  Operator description:

  Applies a fused operation consisting of a 2D convolution followed by SELU activation and instance normalization
  on the input tensor.


  Target Python signature / call pattern:

  fused_instance_norm_selu_conv2d(input: Tensor, weight: Tensor, bias=None, stride=1, padding=0, dilation=1,
  groups=1, num_features=None, eps=1e-5, momentum=0.1, affine=False, track_running_stats=False) -> Tensor:
  input (Tensor): Input tensor of shape (minibatch, in_channels, iH, iW). weight (Tensor): Weights for
  the convolution, shape (out_channels, in_channels / groups, kH, kW). bias (Tensor, optional): Bias for
  the convolution layer, shape (out_channels). stride (int or tuple, optional): Stride of the convolution.
  Default is 1. padding (int or tuple, optional): Padding for the convolution. Default is 0. dilation
  (int or tuple, optional): Spacing between kernel elements. Default is 1. groups (int, optional): Number
  of blocked connections from input channels to output channels. Default is 1. num_features (int, optional):
  Number of features or channels in the input for instance normalization. eps (float, optional): A value
  added to the denominator for numerical stability in instance normalization. Default is 1e-5. momentum
  (float, optional): Momentum for updating running statistics in instance normalization. Default is 0.1.
  affine (bool, optional): If True, instance normalization has learnable affine parameters. Default is
  False. track_running_stats (bool, optional): If True, tracks running mean and variance for instance
  normalization. Default is False.


  PyTorch reference snippet:

  ```python

  conv_output = torch.nn.functional.conv2d(input, weight, bias, stride, padding, dilation, groups) selu_output
  = torch.nn.functional.selu(conv_output) normalized_output = torch.nn.functional.instance_norm(selu_output,
  num_features=num_features, eps=eps, momentum=momentum, affine=affine, track_running_stats=track_running_stats)

  ```


  Example / usage notes:

  >>> input = torch.randn(1, 4, 5, 5)  # Example input tensor >>> weight = torch.randn(8, 4, 3, 3)  #
  Convolution weights >>> output = fused_instance_norm_selu_conv2d(input, weight, num_features=8) >>>
  print(output.shape)  # Expected output shape: (1, 8, 5, 5)


  Additional constraints:

  The function combines convolution, SELU activation, and instance normalization in a single operation.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
