id: torch_addmm
level: 4
category: kernel_translation
title: Torch Addmm
prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.addmm`.\n\
  \nOperator description:\nPerforms a matrix multiplication of the matrices mat1 and mat2. The matrix\
  \ input is added to the final result. If mat1 is a (n x m) tensor, mat2 is a (m x p) tensor, then input\
  \ must be broadcastable with a (n x p) tensor and out will be a (n x p) tensor. Alpha and beta are scaling\
  \ factors on matrix-vector product between mat1 and mat2 and the added matrix input respectively. If\
  \ beta is 0, then input will be ignored, and nan and inf in it will not be propagated. This operation\
  \ supports sparse layouts. If input is sparse the result will have the same layout and if out is provided\
  \ it must have the same layout as input. Sparse support is a beta feature and some layout(s)/dtype/device\
  \ combinations may not be supported, or may not have autograd support. This operator supports TensorFloat32.\
  \ On certain ROCm devices, when using float16 inputs this module will use different precision for backward.\n\
  \nTarget Python signature / call pattern:\naddmm(input, mat1, mat2, *, beta=1, alpha=1, out=None) ->\
  \ Tensor; input (Tensor): matrix to be added; mat1 (Tensor): the first matrix to be matrix multiplied;\
  \ mat2 (Tensor): the second matrix to be matrix multiplied; beta (Number, optional): multiplier for\
  \ input (β); alpha (Number, optional): multiplier for mat1 @ mat2 (α); out (Tensor, optional): the output\
  \ tensor.\n\nMathematical definition:\nout = β * input + α * (mat1 @ mat2)\n\nPyTorch reference snippet:\n\
  ```python\ntorch.addmm(M, mat1, mat2)\n```\n\nExample / usage notes:\n>>> M = torch.randn(2, 3)\n>>>\
  \ mat1 = torch.randn(2, 3)\n>>> mat2 = torch.randn(3, 3)\n>>> torch.addmm(M, mat1, mat2)\ntensor([[-4.8716,\
  \  1.4671, -1.3746],\n        [ 0.7573, -3.9555, -2.8681]])\n\nAdditional constraints:\nSparse support\
  \ is a beta feature and some layout(s)/dtype/device combinations may not be supported, or may not have\
  \ autograd support. This operator supports TensorFloat32. On certain ROCm devices, when using float16\
  \ inputs this module will use different precision for backward.\n\nRequirements (SparkDistill / TritonBench\
  \ harness):\n- Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120\n- Preserve\
  \ numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)\n- Use @triton.jit\
  \ + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr\n- Add @triton.autotune\
  \ when there are meaningful tile/block choices\n- Provide a launcher and a small self-contained test"
