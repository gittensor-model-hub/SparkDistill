title: Lightning Attention
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `lightning_attention.py` (repo: OpenNLPLab/lightning-attention).\n\nTask description:\nThe Triton\
  \ code defines a custom attention mechanism in PyTorch using the Triton library. This attention mechanism\
  \ is implemented as a custom autograd function `LightningAttention2NoDecay` with `forward` and `backward`\
  \ methods. The forward method computes the attention output given input tensors Q (queries), K (keys),\
  \ and V (values), while the backward method computes gradients for Q, K, and V given the gradient of\
  \ the output.\n\n            The `_fwd_kernel` is responsible for the forward pass computation. It calculates\
  \ the attention output by processing Q, K, and V in blocks of size `BLOCK` (64). It uses `NUM_BLOCK`\
  \ to determine how many such blocks exist along the sequence dimension. The kernel loads segments of\
  \ Q, K, and V, computes their dot product, and uses the result to calculate the output by combining\
  \ intra-block (within the block) and inter-block (between blocks) interactions.\n\n            The `_bwd_intra_kernel`\
  \ is used in the backward pass to compute gradients within each block. It processes the gradient of\
  \ the output (`DO`) and calculates the gradients `DQ`, `DK`, and `DV` for each of the input tensors.\
  \ It uses a block size of `CBLOCK` (32) for sub-block computations, iterating over `NUM_BLOCK` blocks.\n\
  \n            The `_bwd_inter_kernel` computes gradients involving interactions between blocks. It iteratively\
  \ updates the accumulated gradients for the entire input sequence. It uses the computed values from\
  \ the `_bwd_intra_kernel` to adjust gradients for keys (K) and values (V).\n\n            The code uses\
  \ a grid launch strategy for parallel computation across batches and heads, defined by `b * h`, and\
  \ sequence dimension divided into blocks.\n\n            Important parameters and settings include:\n\
  \            - `BLOCK`: Main block size (64) used in computations.\n            - `NUM_BLOCK`: Number\
  \ of blocks along the sequence dimension.\n            - `CBLOCK`: Sub-block size (32) used for intra-block\
  \ gradient calculations.\n            - `NUM_CBLOCK`: Number of sub-blocks within each block for intra\
  \ operations.\n\n            These kernels are called using a grid defined by `(b * h, cdiv(e, BLOCK_MODEL))`\
  \ for the forward pass and intra-block backward pass, and `(b * h,)` for the inter-block backward pass.\
  \ The context saves Q, K, and V during the forward pass to facilitate efficient gradient computation\
  \ during the backward pass.\n\nRequirements (SparkDistill / TritonBench harness):\n- Target Triton 3.7.1\
  \ on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor over deprecated\
  \ tl.make_block_ptr\n- Use @triton.jit kernels with correct boundary masking\n- Include @triton.autotune\
  \ with at least 3 configs when tile sizes matter\n- Provide a Python launcher + grid and a torch.allclose\
  \ correctness test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short note if you intentionally\
  \ skip autotune for a tiny elementwise kernel"
