title: Torch Nn Functional Grid Sample
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `torch.nn.functional.grid_sample`.


  Operator description:

  Computes output using input values and pixel locations from grid, supporting spatial (4-D) and volumetric
  (5-D) input. Interpolates output value at specified grid positions using nearest or bilinear interpolation.
  Grid values are normalized within [-1, 1] range, and values outside are handled by padding_mode. Often
  used with affine_grid to build Spatial Transformer Networks.


  Target Python signature / call pattern:

  def grid_sample(input, grid, mode=''bilinear'', padding_mode=''zeros'', align_corners=False) -> Tensor


  PyTorch reference snippet:

  ```python

  torch.nn.functional.grid_sample(input, grid, mode=''bilinear'', padding_mode=''zeros'', align_corners=False)

  ```


  Additional constraints:

  Note: NaN values in grid are interpreted as -1. align_corners=True changes sampled grid positions with
  image resolution. Default for align_corners changed to False since version 1.2.0. bicubic mode implemented
  using cubic convolution algorithm with alpha=-0.75; other packages might use different alpha values.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
constraints:
