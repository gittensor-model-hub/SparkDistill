title: L2 Norm Bwd
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `l2_norm_bwd.py` (repo: ridgerchu/matmulfreellm).


  Task description:

  The Triton kernel `_l2_norm_bwd_kernel` performs a backward pass operation for L2 normalization on a
  per-row basis. It receives pointers to input `X`, output gradient `DY`, and calculates the input gradient
  `DX`. Each row of the input is accessed using the `stride_x_row`. `BLOCK_N` determines the number of
  elements processed per block, set based on maximum allowable fused size and next power of 2 of `N`.
  Within the kernel, it computes the variance of the input slice, uses it to compute the reciprocal of
  the standard deviation (`rstd`), and then calculates `dx` using the formula `dy * rstd - tl.sum(dy *
  x) * (1 / (var+eps)) * rstd * x`. The result is conditionally stored in `DX` using masks. The `_l2_norm_bwd`
  function orchestrates this process, ensuring input tensors `x` and `dy` are properly reshaped and their
  strides configured for contiguity if necessary. If `N` exceeds `BLOCK_N`, an error is raised to prevent
  excessive feature dimensions. Finally, the kernel is launched over `M` rows of the reshaped tensors,
  and the output `dx` is reshaped back to the original input shape.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
