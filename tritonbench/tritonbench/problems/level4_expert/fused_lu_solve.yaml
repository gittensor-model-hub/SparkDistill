title: Fused Lu Solve
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `fused_lu_solve`.


  Operator description:

  Computes the solution `x` to the equation `Ax = b` using LU decomposition. Given matrix `A`, this function
  performs LU decomposition and then solves for `x` in `L @ U @ x = b`, where `P`, `L`, and `U` are derived
  from the LU decomposition.


  Target Python signature / call pattern:

  def fused_lu_solve(A: Tensor, b: Tensor) -> Tensor: A: The input matrix `A` of shape `(n, n)`. b: The
  right-hand side tensor `b` of shape `(n,)`.


  Mathematical definition:

  Solves `Ax = b` using LU decomposition, where `A = P @ L @ U` and `L @ U @ x = b`.


  PyTorch reference snippet:

  ```python

  P, L, U = torch.linalg.lu(A) x = torch.linalg.solve(L @ U, b)

  ```


  Example / usage notes:

  >>> A = torch.tensor([[3., 1., 2.], [6., 3., 4.], [3., 1., 5.]]) >>> b = torch.tensor([1., 2., 3.])
  >>> x = fused_lu_solve(A, b) >>> print(x)


  Additional constraints:

  The function uses LU decomposition to solve linear equations.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
