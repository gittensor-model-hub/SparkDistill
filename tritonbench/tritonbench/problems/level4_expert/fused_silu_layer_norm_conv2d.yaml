prompt: "Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `fused_silu_layer_norm_conv2d`.\n\
  \nOperator description:\nApplies 2D Convolution, followed by Layer Normalization and SiLU activation\
  \ to the input tensor `x`. Sequentially performs convolution on `x`, then applies layer normalization\
  \ on the convolution output, followed by SiLU activation applied element-wise.\n\nTarget Python signature\
  \ / call pattern:\nfused_silu_layer_norm_conv2d(x: torch.Tensor, weight: torch.Tensor, conv_weight:\
  \ torch.Tensor, conv_bias: torch.Tensor = None, conv_stride: int = 1, conv_padding: int = 0, conv_dilation:\
  \ int = 1, conv_groups: int = 1, ln_eps: float = 1e-5) -> torch.Tensor\n\nArgs:\n    x (Tensor): Input\
  \ tensor for convolution, normalization, and activation.\n    weight (Tensor): Learnable weight of size\
  \ matching normalized output dimensions for LayerNorm.\n    conv_weight (Tensor): Convolution kernel\
  \ tensor of appropriate dimensions.\n    conv_bias (Tensor, optional): Convolution bias tensor. Default:\
  \ ``None``.\n    conv_stride (int, optional): Stride of convolution. Default: 1.\n    conv_padding (int,\
  \ optional): Padding added to both sides of input. Default: 0.\n    conv_dilation (int, optional): Dilation\
  \ of convolution kernel. Default: 1.\n    conv_groups (int, optional): Number of groups for convolution.\
  \ Default: 1.\n    ln_eps (float, optional): Epsilon value for Layer Normalization. Default: 1e-5.\n\
  \nExample:\n    >>> x = torch.randn(4, 3, 32, 32)\n    >>> conv_weight = torch.randn(8, 3, 3, 3)\n \
  \   >>> conv_bias = torch.zeros(8)\n    >>> weight = torch.ones(8)\n    >>> output = fused_silu_layer_norm_conv2d(x,\
  \ weight, conv_weight, conv_bias, conv_stride=1, conv_padding=1)\n    >>> print(output.shape)\n    torch.Size([4,\
  \ 8, 32, 32])\n\nPyTorch reference snippet:\n```python\nconv_out = torch.nn.functional.conv2d(x, conv_weight,\
  \ bias=conv_bias, stride=conv_stride, padding=conv_padding, dilation=conv_dilation, groups=conv_groups)\n\
  normalized_out = torch.nn.functional.layer_norm(conv_out, conv_out.shape[1:], eps=ln_eps)\noutput =\
  \ torch.nn.functional.silu(normalized_out)\n```\n\nExample / usage notes:\n>>> x = torch.randn(4, 3,\
  \ 32, 32)\n>>> conv_weight = torch.randn(8, 3, 3, 3)\n>>> conv_bias = torch.zeros(8)\n>>> weight = torch.ones(8)\n\
  >>> output = fused_silu_layer_norm_conv2d(x, weight, conv_weight, conv_bias, conv_stride=1, conv_padding=1)\n\
  >>> print(output.shape)\ntorch.Size([4, 8, 32, 32])\n\nAdditional constraints:\nConvolution operation\
  \ parameters include stride, padding, dilation, and groups. Layer Normalization uses an epsilon value.\
  \ Default values are provided for optional parameters.\n\nRequirements (SparkDistill / TritonBench harness):\n\
  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120\n- Preserve numerics:\
  \ include torch.allclose vs the reference (atol/rtol appropriate for dtype)\n- Use @triton.jit + boundary\
  \ masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr\n- Add @triton.autotune when there\
  \ are meaningful tile/block choices\n- Provide a launcher and a small self-contained test"
