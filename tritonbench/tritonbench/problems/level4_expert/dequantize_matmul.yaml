title: Dequantize Matmul
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `dequantize_matmul.py` (repo: S-LoRA/S-LoRA).


  Task description:

  The code includes a Triton kernel called ''dequantize_kernel'', which takes input int8 matrix ''b'',
  scale factors ''b_scale'', and outputs a float matrix ''fpb''. It uses block indices to load segments
  of ''b'' and ''b_scale'', multiplies these to dequantize, and stores the result in ''fpb''. Parameters
  ''K'' and ''N'' define matrix dimensions, while strides manage memory layout. The function ''matmul_dequantize_int8''
  ensures matrix dimension compatibility and performs the dequantization using ''dequantize_kernel'',
  followed by a matrix multiplication with input matrix ''a'' using PyTorch''s ''torch.mm''. The result
  is stored in matrix ''c''. The kernel utilizes Triton''s ''@autotune'' to optimize performance with
  different configurations specified by ''BLOCK_SIZE_N'' and ''BLOCK_SIZE_K''.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
constraints:
