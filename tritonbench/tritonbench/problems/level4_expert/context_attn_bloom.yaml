title: Context Attn Bloom
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `context_attn_bloom.py` (repo: ModelTC/lightllm).\n\nTask description:\nThe provided Triton\
  \ kernel is designed to perform the forward pass of a context attention mechanism, primarily used in\
  \ Transformer architectures. This kernel is tailored for execution on a GPU, utilizing Triton's capabilities\
  \ for efficient parallel processing.\n\n            The key Triton function, '_fwd_kernel', is executed\
  \ over a grid defined by batch, head, and input length dimensions. It processes multiple queries, keys,\
  \ and values, computing attention scores and subsequently deriving an output tensor. This function supports\
  \ batched and multi-headed attention, allowing flexibility in model architectures.\n\n            Within\
  \ '_fwd_kernel', queries (Q) are loaded for each block, and their dot product with keys (K) is calculated.\
  \ This product is scaled by a factor derived from the head dimension, followed by the application of\
  \ the softmax function to produce attention weights. These weights are then multiplied with values (V)\
  \ to accumulate the output, which represents the weighted sum based on attention scores.\n\n       \
  \     Special attention is given to handling different sequence lengths, batching, and the multi-head\
  \ structure, with each kernel instance operating independently across these dimensions. Stride parameters\
  \ ensure that memory is accessed correctly based on input tensor shapes.\n\n            The 'context_attention_fwd'\
  \ function orchestrates this process by setting up the necessary kernel arguments, computing grid dimensions\
  \ based on the input size, and selecting appropriate block sizes for optimal performance. It accounts\
  \ for hardware specifics, such as different configurations for Tesla GPUs, ensuring that the kernel\
  \ runs efficiently across various setups.\n\nRequirements (SparkDistill / TritonBench harness):\n- Target\
  \ Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor over\
  \ deprecated tl.make_block_ptr\n- Use @triton.jit kernels with correct boundary masking\n- Include @triton.autotune\
  \ with at least 3 configs when tile sizes matter\n- Provide a Python launcher + grid and a torch.allclose\
  \ correctness test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short note if you intentionally\
  \ skip autotune for a tiny elementwise kernel"
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  dtype_hint: float32 preferred unless the task requires lower precision
required_patterns:
- '@triton.jit'
- tl.load
- tl.store
- '@triton.autotune'
tags:
- attention
- matmul
- softmax
- elementwise
