title: Fused Cosine Embedding Loss With Normalization
prompt: 'Translate the following PyTorch operator into a Triton 3.7.1 kernel suite named `fused_cosine_embedding_loss_with_normalization`.


  Operator description:

  Computes cosine embedding loss between two normalized tensors. This function first normalizes the inputs
  along the specified dimension using L2 normalization and then calculates the cosine embedding loss.
  The loss encourages similarity when the target is 1 and dissimilarity when the target is -1. It accepts
  optional parameters margin for dissimilarity control and reduction method for output aggregation.


  Target Python signature / call pattern:

  def fused_cosine_embedding_loss_with_normalization(input1: torch.Tensor, input2: torch.Tensor, target:
  torch.Tensor, margin: float = 0, reduction: str = ''mean'') -> torch.Tensor: input1 (Tensor): First
  input tensor to be normalized and compared. input2 (Tensor): Second input tensor to be normalized and
  compared. target (Tensor): Tensor label with values 1 or -1, where 1 encourages similarity and -1 encourages
  dissimilarity. margin (float, optional): Margin for dissimilarity. Default: 0. reduction (str, optional):
  Specifies the reduction to apply to the output: ''none'' | ''mean'' | ''sum''. Default: ''mean''.


  PyTorch reference snippet:

  ```python

  torch.nn.functional.normalize

  ,torch.nn.functional.normalize,torch.nn.functional.cosine_embedding_loss

  ```


  Example / usage notes:

  >>> input1 = torch.randn(3, 5, requires_grad=True)

  >>> input2 = torch.randn(3, 5, requires_grad=True)

  >>> target = torch.tensor([1, -1, 1])  # Example labels for similarity/dissimilarity

  >>> loss = fused_cosine_embedding_loss_with_normalization(input1, input2, target)

  >>> print(loss)

  >>> loss.backward()


  Additional constraints:

  The inputs are first L2 normalized along dimension 1 before loss calculation. The reduction parameter
  can be ''none'', ''mean'', or ''sum'', with default as ''mean''.


  Requirements (SparkDistill / TritonBench harness):

  - Translate the PyTorch reference into Triton 3.7.1 kernels for Blackwell SM120

  - Preserve numerics: include torch.allclose vs the reference (atol/rtol appropriate for dtype)

  - Use @triton.jit + boundary masks; prefer tl.make_tensor_descriptor over tl.make_block_ptr

  - Add @triton.autotune when there are meaningful tile/block choices

  - Provide a launcher and a small self-contained test'
