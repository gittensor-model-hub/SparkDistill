title: Chunk Cumsum Vector
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `chunk_cumsum_vector.py` (repo: sustcsonglin/flash-linear-attention).\n\nTask description:\n\
  The code defines a Triton-based GPU kernel called `chunk_global_cumsum_vector_kernel` and a corresponding\
  \ Python function `chunk_global_cumsum_vector` for applying this kernel. The kernel computes a global\
  \ cumulative sum over blocks in a 4D input tensor `s`. The tensor dimensions are interpreted as [Batch,\
  \ Head, Time, Size]. The kernel uses block processing, defined by the `BT` (block time) and `BS` (block\
  \ size) parameters. The kernel performs the following steps:\n\n    1. It determines the program's position\
  \ using `tl.program_id`, which assigns work to the kernel across blocks of the tensor.\n    2. A lower\
  \ triangular mask `m_s` is created to ensure each element's sum includes all previous elements in the\
  \ current block row.\n    3. For each block in the time dimension (`T`), a pointer to the relevant data\
  \ slice in `s` is created with `tl.make_block_ptr`.\n    4. Data from `s` is loaded into `b_s`, processed\
  \ as `float32` for precision.\n    5. Matrix multiplication (`tl.dot`) with the mask `m_s` is used to\
  \ compute the block-level cumulative sum, stored in `b_c`.\n    6. The result is stored back to the\
  \ output tensor `z`.\n    7. The running sum `b_z` is updated after processing each block column.\n\n\
  \    The `chunk_global_cumsum_vector` function prepares the input tensor `s`, and creates an output\
  \ tensor `z` of the same shape. It sets the computation grid based on tensor dimensions and block size.\
  \ The kernel is called with this grid, using dimensions like `stride` to correctly address tensor slices.\n\
  \n    The kernel uses Triton's `autotune` decorator to choose optimal execution configurations (combinations\
  \ of block size and number of warps) based on input size `S`. This approach improves performance by\
  \ adapting to specific hardware characteristics.\n\nRequirements (SparkDistill / TritonBench harness):\n\
  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor\
  \ over deprecated tl.make_block_ptr\n- Use @triton.jit kernels with correct boundary masking\n- Include\
  \ @triton.autotune with at least 3 configs when tile sizes matter\n- Provide a Python launcher + grid\
  \ and a torch.allclose correctness test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short\
  \ note if you intentionally skip autotune for a tiny elementwise kernel"
