prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `chunk_delta_fwd.py` (repo: josStorer/RWKV-Runner).\n\nTask description:\nThe Triton kernel\
  \ `chunk_delta_rule_fwd_kernel_h` is a high-performance function aimed at batch processing of input\
  \ tensors `k`, `v`, and `d`, producing an output tensor `v_new` with optional state management using\
  \ `initial_state` and `final_state`. The kernel is decorated with `triton.autotune`, which provides\
  \ multiple configurations varying the number of warps (1, 2, 4, 8, 16, 32) to identify the most efficient\
  \ execution strategy based on input sizes (`BT`, `BK`, `BV`).\n\n    The kernel operates on a grid of\
  \ blocks, each identified by `i_k`, `i_v`, and `i_bh` through `tl.program_id`. Each block processes\
  \ a portion of the input data defined by dimensions (`K`, `V`) and manages state updates. The use of\
  \ Triton's block pointers via `tl.make_block_ptr` allows efficient memory operations by precisely controlling\
  \ the access pattern to input/output tensors within each block.\n\n    Key operations in the kernel\
  \ involve:\n    - Loading initial state (`b_h`) if `USE_INITIAL_STATE` is true.\n    - Iterating over\
  \ time dimension (`NT`) and performing block-wise operations, including storing current state to `h`,\
  \ and updating `v` using `d` and `k`.\n    - Computing cumulative sums (`b_h_cumsum`) of the result\
  \ of matrix multiplications using `tl.dot` without TensorFloat32 to ensure precision.\n    - Storing\
  \ the final cumulative state if `STORE_FINAL_STATE` is true.\n\n    The wrapper function `chunk_fwd_h_fn`\
  \ sets up the computation environment by computing block sizes based on input tensor dimensions (`BT`,\
  \ `BK`, `BV`) and constraints like maximum warp size. It initializes the output tensors `h` and `v_new`,\
  \ configures the execution grid, and calls the Triton kernel with appropriate parameters, including\
  \ strides calculated from input tensor shapes.\n\n    Overall, the provided Triton code is optimized\
  \ for GPU execution, leveraging Triton's features like configurable warps and block pointers to maximize\
  \ throughput while maintaining precision. The focus is on efficient use of memory and parallelism to\
  \ handle large-scale tensor operations typical in deep learning workloads.\n\nRequirements (SparkDistill\
  \ / TritonBench harness):\n- Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer\
  \ tl.make_tensor_descriptor over deprecated tl.make_block_ptr\n- Use @triton.jit kernels with correct\
  \ boundary masking\n- Include @triton.autotune with at least 3 configs when tile sizes matter\n- Provide\
  \ a Python launcher + grid and a torch.allclose correctness test\n- Use fp32 accumulators for tl.dot\
  \ reductions\n- Print a short note if you intentionally skip autotune for a tiny elementwise kernel"
