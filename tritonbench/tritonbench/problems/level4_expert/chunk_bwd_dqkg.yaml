prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `chunk_bwd_dqkg.py` (repo: sustcsonglin/flash-linear-attention).


  Task description:

  The Triton kernel `chunk_simple_gla_bwd_kernel_dqkg` calculates the backward gradients for query (`dq`),
  key (`dk`), and a gating mechanism (`dg`) used in attention mechanisms of neural networks, specifically
  transformers. The kernel operates on the tensors: `q` (query), `k` (key), `v` (value), `h` (hidden states),
  `g` (gating), `do` (output differential), and `dh` (hidden differential). It leverages Triton''s `autotune`
  decorator, which optimizes for performance by experimenting with 4 and 8 warp configurations based on
  input dimensions `BT`, `BK`, and `BV`. The primary function executes in parallel over grid dimensions
  `(NK, NT, B*H)` with indices set by Triton''s program ID functions. The kernel first initializes zero
  tensors for gradients and performs calculations such as matrix multiplications and exponential scalings
  to fill `b_dq`, `b_dk`, and `b_dg` during the loop over `V`. Boundary checks are used during tensor
  loading to prevent out-of-bounds memory access. The kernel stores results back to the output tensors
  (`dq`, `dk`, `dg`) using block pointers to access appropriate memory locations. The host function `chunk_bwd_dqkg_fn`
  defines grid settings and tensor shapes, initializes output tensors, and launches the Triton kernel,
  facilitating gradient calculations in attention models.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
