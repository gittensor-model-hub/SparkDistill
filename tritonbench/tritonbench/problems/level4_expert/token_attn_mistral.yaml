title: Token Attn Mistral
prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `token_attn_mistral.py` (repo: ModelTC/lightllm).\n\nTask description:\nThe Triton kernel `_fwd_kernel_token_att2`\
  \ is designed to compute attention over tokens in a parallelized fashion. It takes several inputs: probability\
  \ matrix `Prob`, value tensor `V`, and an output tensor `Out` among other auxiliary inputs such as `Req_to_tokens`\
  \ that maps requests to tokens, and several batch-related indices and strides. \n\n            - The\
  \ kernel computes attention by iterating over token sequences (`BLOCK_N` size blocks) within a batch\
  \ and head context (`cur_batch` and `cur_head`). The indices are adjusted based on the current position,\
  \ head, and sequence length to ensure that only valid indices are processed.\n            \n       \
  \     - For each block of tokens, it loads relevant slices of the `Prob` and `V` tensors into `p_value`\
  \ and `v_value`. These are multiplied and accumulated into `acc`, the accumulator for the final result.\n\
  \n            - Once all blocks are processed, `acc` is cast to the output's data type and stored in\
  \ the output tensor `Out` at the corresponding position calculated via strides.\n\n            The function\
  \ `token_att_fwd2` serves as a Python interface for this Triton kernel. It initializes parameters like\
  \ block size (`BLOCK`), grid dimensions, and computes `kv_group_num` to determine the head groups for\
  \ key-value pairs. It then calls the Triton kernel with these parameters. No gradients are computed\
  \ as the function is decorated with `@torch.no_grad()`.\n\nRequirements (SparkDistill / TritonBench\
  \ harness):\n- Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)\n- Prefer tl.make_tensor_descriptor\
  \ over deprecated tl.make_block_ptr\n- Use @triton.jit kernels with correct boundary masking\n- Include\
  \ @triton.autotune with at least 3 configs when tile sizes matter\n- Provide a Python launcher + grid\
  \ and a torch.allclose correctness test\n- Use fp32 accumulators for tl.dot reductions\n- Print a short\
  \ note if you intentionally skip autotune for a tiny elementwise kernel"
constraints:
  triton_version: 3.7.1
  gpu_target: Blackwell-SM120
  dtype_hint: float32 preferred unless the task requires lower precision
required_patterns:
- '@triton.jit'
- tl.load
- tl.store
- '@triton.autotune'
