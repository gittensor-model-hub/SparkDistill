prompt: "Write a complete Triton 3.7.1 implementation for the following GPU kernel task.\nUpstream reference\
  \ file: `attention_fwd_triton3.py` (repo: microsoft/MInference).\n\nTask description:\nThe provided\
  \ code is a Triton-accelerated implementation of the forward pass for an attention mechanism, typically\
  \ used in transformer architectures. The main kernel function `_attn_fwd` is JIT-compiled using Triton,\
  \ which allows for optimized, parallel execution on GPUs. The kernel takes inputs Q, K, and V matrices,\
  \ which are the query, key, and value matrices respectively, and computes attention outputs using block\
  \ matrix operations for efficiency. \n\n            The `_attn_fwd_inner` function is central to this\
  \ operation. It calculates attention scores through the matrix product of Q and K (QK), scales the results\
  \ using `qk_scale`, applies a mask if a sliding window attention is specified, and uses exponential\
  \ scaling to stabilize the softmax computation. The function updates running maxima `m_i` and likelihoods\
  \ `l_i` for each block. These are crucial for numerical stability, avoiding overflow/underflow when\
  \ computing softmax.\n\n            The outer `_attn_fwd` function initializes memory pointers for the\
  \ Q, K, V, and output matrices. It calculates block pointers which dictate data layout in shared memory,\
  \ enabling efficient memory access patterns. Depending on the context sizes, it configures whether boundary\
  \ checks are necessary for matrix loads to ensure out-of-bound accesses are avoided. The use of `tl.math.exp2`\
  \ instead of the traditional exponential function hints at specific numerical optimizations in logarithm\
  \ base 2 for GPU-friendly calculations.\n\n            Parameters such as `BLOCK_M`, `BLOCK_N`, and\
  \ `BLOCK_DMODEL` determine the size of each processing block, crucial for performance tuning, as they\
  \ define shared memory usage and the degree of parallelism. The `_forward` function acts as an interface,\
  \ preparing the input data, managing kernel execution, handling exceptions like `triton.OutOfResources`,\
  \ and adjusting block sizes if resource limitations are hit. The function supports additional functionality\
  \ such as handling end-of-sequence operations, initializing accumulators, and managing sliding window\
  \ constraints.\n\n            Overall, this code is structured to ensure high performance on GPU architectures\
  \ by leveraging Triton's ability to automatically parallelize workloads, manage synchronization, and\
  \ exploit fast memory hierarchies through efficient tiling and batching strategies.\n\nRequirements\
  \ (SparkDistill / TritonBench harness):\n- Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x\
  \ / SM120)\n- Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr\n- Use @triton.jit\
  \ kernels with correct boundary masking\n- Include @triton.autotune with at least 3 configs when tile\
  \ sizes matter\n- Provide a Python launcher + grid and a torch.allclose correctness test\n- Use fp32\
  \ accumulators for tl.dot reductions\n- Print a short note if you intentionally skip autotune for a\
  \ tiny elementwise kernel"
