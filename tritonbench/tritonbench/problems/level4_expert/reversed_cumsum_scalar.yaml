title: Reversed Cumsum Scalar
prompt: 'Write a complete Triton 3.7.1 implementation for the following GPU kernel task.

  Upstream reference file: `reversed_cumsum_scalar.py` (repo: sustcsonglin/flash-linear-attention).


  Task description:

  The `chunk_global_reversed_cumsum_scalar_kernel` is a Triton kernel that computes a reversed cumulative
  sum for a given 3D tensor `s` of shape (B, H, T) where B is the batch dimension, H is the number of
  heads, and T is the sequence length. The kernel executes for each (B, H) pair independently, by utilizing
  a grid where the grid size is (B * H). For each block, it initializes an accumulation variable `b_z`
  to zero. It then iterates over the dimension T in blocks of size `BT`, moving backwards from the end
  to the start. In each iteration, it computes the sum of the current block, updates the accumulation
  variable, calculates the cumulative sum by subtracting it from the sum, and stores the result in the
  output tensor `o`. The function `chunk_global_reversed_cumsum_scalar` serves as a wrapper to handle
  PyTorch tensor input and output, and it defines the kernel configuration parameters such as grid size
  and tensor data types.


  Requirements (SparkDistill / TritonBench harness):

  - Target Triton 3.7.1 on workstation Blackwell (CUDA SM12x / SM120)

  - Prefer tl.make_tensor_descriptor over deprecated tl.make_block_ptr

  - Use @triton.jit kernels with correct boundary masking

  - Include @triton.autotune with at least 3 configs when tile sizes matter

  - Provide a Python launcher + grid and a torch.allclose correctness test

  - Use fp32 accumulators for tl.dot reductions

  - Print a short note if you intentionally skip autotune for a tiny elementwise kernel'
